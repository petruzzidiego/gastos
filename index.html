          <div style="width:14px;height:14px;border-radius:50%;background:${c.color};flex-shrink:0"></div>`;
        row.appendChild(makeDelBtn(()=>{ DB.categories=DB.categories.filter(x=>x.id!==c.id); saveDB(DB); render(); }));
        card.appendChild(row);
        wrap.appendChild(card);
      });
    });

    const addBtn=h('button',{class:'btn btn-ghost btn-full',style:{border:`2px dashed ${G.accent}`,background:G.accentDim,color:G.accent,borderRadius:'14px',padding:'14px',marginTop:'12px'},onClick:openCatForm},'+ Nueva categoría');
    wrap.appendChild(addBtn);
  }

  function openCatForm() {
    let f={name:'',icon:'📦',color:'#4b5563',type:'gasto'};
    const body=h('div');
    function rb(){
      body.innerHTML='';
      const ni=makeInput({type:'text',placeholder:'Ej: Gym, Netflix...',value:f.name}); ni.oninput=e=>f.name=e.target.value;
      body.appendChild(makeField('Nombre',ni));
      const typePills=h('div',{style:{display:'flex',gap:'8px'}});
      [['gasto','Gasto'],['ingreso','Ingreso'],['ambos','Ambos']].forEach(([v,l])=>{
        const btn=h('button',{class:'pill'+(f.type===v?' active':''),onClick:()=>{ f.type=v; rb(); }},l);
        typePills.appendChild(btn);
      });
      body.appendChild(makeField('Tipo',typePills));
      const ig=h('div',{class:'icon-grid'});
      ICONS.forEach(ic=>{ const btn=h('button',{class:'icon-btn'+(f.icon===ic?' selected':''),onClick:()=>{ f.icon=ic; rb(); }},ic); ig.appendChild(btn); });
      body.appendChild(makeField('Ícono',ig));
      const cg=h('div',{class:'color-grid'});
      PALETTE.forEach(c=>{ const d=h('div',{class:'color-dot'+(f.color===c?' selected':''),style:{background:c},onClick:()=>{ f.color=c; rb(); }}); cg.appendChild(d); });
      body.appendChild(makeField('Color',cg));
      const br=h('div',{class:'btn-row'});
      br.appendChild(makeBtn('Cancelar',closeModal,'ghost'));
      br.appendChild(makeBtn('Guardar',()=>{ if(!f.name)return; DB.categories.push({...f,id:uid()}); saveDB(DB); closeModal(); render(); },'primary',{full:true}));
      body.appendChild(br);
    }
    rb();
    openModal('Nueva categoría',body);
  }

  render();
  return wrap;
}

// ─── REPORTES ────────────────────────────────────────────────────────────────
function reportes() {
  const wrap=h('div');
  let rTab='categorias', month=monthKey();

  const months=[...new Set(realMovs().map(m=>m.date?.slice(0,7)))].sort().reverse();
  if(!months.includes(monthKey())) months.unshift(monthKey());

  const tabPills=h('div',{class:'pills'});
  [['categorias','🍕 Categorías'],['meses','📊 Meses'],['saldo','📈 Saldo'],['tarjetas','💳 Tarjetas'],['cuotas','⏳ Cuotas']].forEach(([val,lbl])=>{
    const btn=h('button',{class:'pill'+(rTab===val?' active':''),onClick:()=>{ rTab=val; tabPills.querySelectorAll('.pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderReport(); }},lbl);
    tabPills.appendChild(btn);
  });
  wrap.appendChild(tabPills);

  const reportArea=h('div');
  wrap.appendChild(reportArea);

  function renderReport() {
    if(activeChart){ activeChart.destroy(); activeChart=null; }
    reportArea.innerHTML='';

    if(rTab==='categorias'||rTab==='tarjetas') {
      const mp=h('div',{class:'pills'});
      months.forEach(mk=>{
        const btn=h('button',{class:'pill'+(month===mk?' active':''),onClick:()=>{ month=mk; mp.querySelectorAll('.pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderReport(); }},monthLabel(mk));
        mp.appendChild(btn);
      });
      reportArea.appendChild(mp);
    }

    if(rTab==='categorias') {
      const movs=realMovs().filter(m=>m.date?.startsWith(month)&&m.type==='gasto');
      const map={};
      movs.forEach(m=>{ const cat=DB.categories.find(c=>c.id===m.categoryId); const name=cat?.name||'Sin cat.'; const color=cat?.color||G.muted; if(!map[name])map[name]={name,color,value:0,count:0}; map[name].value+=m.amount; map[name].count++; });
      const catData=Object.values(map).sort((a,b)=>b.value-a.value);
      const total=catData.reduce((s,c)=>s+c.value,0);
      if(catData.length===0){ reportArea.appendChild(makeCard(h('div',{class:'empty'},'Sin gastos este mes'))); return; }
      const chartCard=makeCard(h('div'));
      chartCard.innerHTML='<div class="chart-wrap"><canvas id="rep-chart"></canvas></div>';
      reportArea.appendChild(chartCard);
      setTimeout(()=>{
        const ctx=document.getElementById('rep-chart');
        if(!ctx)return;
        activeChart=new Chart(ctx,{type:'doughnut',data:{labels:catData.map(c=>c.name),datasets:[{data:catData.map(c=>c.value),backgroundColor:catData.map(c=>c.color),borderWidth:2,borderColor:'#fff'}]},options:{cutout:'55%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)}`}}},responsive:true,maintainAspectRatio:false}});
      },50);
      catData.forEach(c=>{
        const row=makeCard(h('div'));
        row.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;align-items:center;gap:10px"><div style="width:10px;height:10px;border-radius:50%;background:${c.color}"></div><span style="font-size:14px;font-weight:600">${c.name}</span></div>
          <div style="display:flex;gap:14px;align-items:center"><span style="font-size:11px;color:${G.muted}">${c.count} ops · ${total?Math.round(c.value/total*100):0}%</span>
          <span class="mono" style="font-size:14px;font-weight:700;color:${c.color}">${fmt(c.value)}</span></div></div>`;
        reportArea.appendChild(row);
      });
    }

    if(rTab==='meses') {
      const barData=months.slice(0,6).reverse().map(mk=>{ const ms=realMovs().filter(m=>m.date?.startsWith(mk)); return {name:monthLabel(mk).split(' ')[0],ingresos:ms.filter(m=>m.type==='ingreso').reduce((s,m)=>s+m.amount,0),gastos:ms.filter(m=>m.type==='gasto').reduce((s,m)=>s+m.amount,0)}; });
      const chartCard=makeCard(h('div'));
      chartCard.innerHTML=`<div style="font-size:12px;color:${G.muted};font-weight:600;margin-bottom:12px">Ingresos vs Gastos — últimos 6 meses</div><div class="chart-wrap"><canvas id="rep-chart"></canvas></div>`;
      reportArea.appendChild(chartCard);
      setTimeout(()=>{
        const ctx=document.getElementById('rep-chart');
        if(!ctx)return;
        activeChart=new Chart(ctx,{type:'bar',data:{labels:barData.map(d=>d.name),datasets:[{label:'Ingresos',data:barData.map(d=>d.ingresos),backgroundColor:G.green,borderRadius:5},{label:'Gastos',data:barData.map(d=>d.gastos),backgroundColor:G.red,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{grid:{display:false}},y:{grid:{color:G.border},ticks:{callback:v=>`$${v>=1000?(v/1000).toFixed(0)+'k':v}`}}}}});
      },50);
      [...barData].reverse().forEach(d=>{
        const row=makeCard(h('div'));
        row.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700">${d.name}</span>
          <div style="display:flex;gap:14px"><span class="mono" style="color:${G.green};font-size:13px;font-weight:600">+${fmt(d.ingresos)}</span>
          <span class="mono" style="color:${G.red};font-size:13px;font-weight:600">-${fmt(d.gastos)}</span></div></div>`;
        reportArea.appendChild(row);
      });
    }

    if(rTab==='saldo') {
      const lineData=months.slice(0,6).reverse().map(mk=>{ const ms=realMovs().filter(m=>m.date?.startsWith(mk)); return {name:monthLabel(mk).split(' ')[0],balance:ms.reduce((s,m)=>s+(m.type==='ingreso'?m.amount:-m.amount),0)}; });
      const chartCard=makeCard(h('div'));
      chartCard.innerHTML=`<div style="font-size:12px;color:${G.muted};font-weight:600;margin-bottom:12px">Evolución del balance neto mensual</div><div class="chart-wrap"><canvas id="rep-chart"></canvas></div>`;
      reportArea.appendChild(chartCard);
      setTimeout(()=>{
        const ctx=document.getElementById('rep-chart');
        if(!ctx)return;
        activeChart=new Chart(ctx,{type:'line',data:{labels:lineData.map(d=>d.name),datasets:[{label:'Balance neto',data:lineData.map(d=>d.balance),borderColor:G.accent,backgroundColor:G.accentDim,fill:true,tension:.4,pointRadius:4,pointBackgroundColor:G.accent}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:G.border},ticks:{callback:v=>`$${v>=1000?(v/1000).toFixed(0)+'k':v}`}}}}});
      },50);
    }

    if(rTab==='tarjetas') {
      const movs=realMovs().filter(m=>m.date?.startsWith(month)&&m.type==='gasto');
      const cardData=DB.cards.map(c=>({name:c.name.split(' ')[0],color:c.color,value:movs.filter(m=>m.cardId===c.id).reduce((s,m)=>s+m.amount,0)})).filter(c=>c.value>0);
      if(cardData.length===0){ reportArea.appendChild(makeCard(h('div',{class:'empty'},'Sin gastos con tarjeta'))); return; }
      cardData.forEach(c=>{
        const row=makeCard(h('div'));
        row.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:${c.color}"></div><span style="font-weight:700">${c.name}</span></div><span class="mono" style="color:${c.color};font-weight:700">${fmt(c.value)}</span></div>`;
        reportArea.appendChild(row);
      });
    }

    if(rTab==='cuotas') {
      const installData=DB.cards.map(c=>{ const pending=DB.movements.filter(m=>m.cardId===c.id&&m.type==='gasto'&&m.date>today()); const byMonth={}; pending.forEach(m=>{ const mk=m.date.slice(0,7); byMonth[mk]=(byMonth[mk]||0)+m.amount; }); return {card:c,pending,total:pending.reduce((s,m)=>s+m.amount,0),byMonth}; }).filter(c=>c.total>0);
      if(installData.length===0){ reportArea.appendChild(makeCard(h('div',{class:'empty'},'Sin cuotas pendientes 🎉'))); return; }
      installData.forEach(({card,pending,total,byMonth})=>{
        const c=h('div',{class:'card card-pad',style:{marginBottom:'12px',border:`1.5px solid ${card.color}44`}});
        c.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-weight:800;font-size:16px;color:${card.color}">${card.name}</span>
          <span class="tag" style="background:${G.yellowDim};color:${G.yellow};border:1px solid ${G.yellow}30">Total: ${fmt(total)}</span></div>
          ${Object.entries(byMonth).sort(([a],[b])=>a.localeCompare(b)).map(([mk,amt])=>`<div class="table-row"><span style="font-size:13px;color:${G.textSoft}">${monthLabel(mk)}</span><span class="mono" style="font-size:13px;color:${G.yellow};font-weight:600">${fmt(amt)}</span></div>`).join('')}
          <div style="font-size:11px;color:${G.muted};margin-top:10px">${pending.length} cuotas en ${Object.keys(byMonth).length} meses</div>`;
        reportArea.appendChild(c);
      });
    }
  }

  renderReport();
  return wrap;
}

// ─── VENCIMIENTOS ────────────────────────────────────────────────────────────
function openPagarVencimiento(due, onDone) {
  let selectedType='cuenta'; // 'cuenta' o 'tarjeta'
  let selectedId='';
  const body=h('div');

  // Resumen del vencimiento
  const resumen=h('div',{style:{background:G.accentDim,borderRadius:'12px',padding:'12px',marginBottom:'16px'}});
  resumen.innerHTML=`<div style="font-weight:800;font-size:16px">${due.name}</div>
    <div style="font-size:13px;color:${G.muted};margin-top:2px">${due.category}${due.bank?' · '+due.bank:''}</div>
    <div class="mono" style="font-size:22px;font-weight:700;color:${G.red};margin-top:6px">${fmt(due.amount,due.currency)}</div>`;
  body.appendChild(resumen);

  function rb() {
    // Limpiar todo excepto resumen
    while(body.children.length > 1) body.removeChild(body.lastChild);

    // Selector tipo de pago
    const typeRow=h('div',{class:'field'},[h('label',{class:'field-label'},'¿Cómo pagás?')]);
    const typePills=h('div',{style:{display:'flex',gap:'8px',marginBottom:'4px'}});
    [['cuenta','🏦 Cuenta / Efectivo'],['tarjeta','💳 Tarjeta']].forEach(([v,l])=>{
      const btn=h('button',{class:'pill'+(selectedType===v?' active':''),onClick:()=>{ selectedType=v; selectedId=''; rb(); }},l);
      typePills.appendChild(btn);
    });
    typeRow.appendChild(typePills);
    body.appendChild(typeRow);

    if(selectedType==='cuenta') {
      const opts=[['','Seleccioná una cuenta'],...DB.accounts.map(a=>[a.id,`${a.icon||'🏦'} ${a.name} (${fmt(a.balance,a.currency)})`])];
      body.appendChild(makeField('Cuenta',makeSelect(opts,selectedId,v=>selectedId=v)));
    } else {
      const opts=[['','Seleccioná una tarjeta'],...DB.cards.map(c=>[c.id,c.name])];
      body.appendChild(makeField('Tarjeta',makeSelect(opts,selectedId,v=>selectedId=v)));
    }

    // Fecha del pago
    const dateInp=makeInput({type:'date',value:today()});
    body.appendChild(makeField('Fecha del pago',dateInp));

    const br=h('div',{class:'btn-row'});
    br.appendChild(makeBtn('Cancelar',closeModal,'ghost'));
    br.appendChild(makeBtn('✓ Confirmar pago',()=>{
      const payDate=dateInp.value||today();
      const cat=DB.categories.find(c=>c.name==='Impuesto'||c.name==='Servicios'||c.name===due.category);

      // Crear movimiento
      const mov={
        id:uid(), type:'gasto',
        description:`${due.category}: ${due.name}`,
        amount:due.amount, currency:due.currency,
        date:payDate, categoryId:cat?.id||'',
        accountId: selectedType==='cuenta'?selectedId:null,
        cardId: selectedType==='tarjeta'?selectedId:null,
        pendingCard: selectedType==='tarjeta'  // si es tarjeta, es pendiente hasta pagar resumen
      };
      DB.movements.push(mov);

      // Descontar de cuenta si aplica
      if(selectedType==='cuenta' && selectedId) {
        DB.accounts=DB.accounts.map(a=>a.id===selectedId?{...a,balance:a.balance-due.amount}:a);
      }

      // Marcar vencimiento como pagado con referencia al movimiento
      DB.dues=DB.dues.map(x=>x.id===due.id?{...x,paid:true,movementId:mov.id,paidAt:payDate}:x);

      saveDB(DB); closeModal(); onDone();
    },'primary',{full:true}));
    body.appendChild(br);
  }

  rb();
  openModal(`Pagar: ${due.name}`,body);
}

function gcalLinkFromDue(d) {
  const dateStr=d.dueDate.replace(/-/g,'');
  const title=encodeURIComponent(`💸 ${d.category}: ${d.name}`);
  let detail=`Monto: ${fmt(d.amount,d.currency)}`;
  if(d.cuit) detail+=`\nCUIT/CUIL: ${d.cuit}`;
  if(d.accountNumber) detail+=`\nNro cuenta/patente/ref: ${d.accountNumber}`;
  if(d.bank) detail+=`\nEntidad: ${d.bank}`;
  if(d.notes) detail+=`\n\nNotas: ${d.notes}`;
  detail+=`\n\n⚠️ Recordá verificar saldo con anticipación.`;
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateStr}/${dateStr}&details=${encodeURIComponent(detail)}`;
}

function vencimientos() {
  const wrap=h('div');
  let filter='pendientes';
  const CATS=['Impuesto','ABL','AFIP','Expensas','Tarjeta','Servicio','Alquiler','Seguro','Cuota','Otro'];
  const now=new Date();

  const pills=h('div',{class:'pills'});
  const listArea=h('div');

  function gcalLink(d) { return gcalLinkFromDue(d); }

  function renderList() {
    listArea.innerHTML='';
    const filtered=DB.dues.filter(d=>filter==='todos'?true:filter==='pagados'?d.paid:!d.paid).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
    if(filtered.length===0){ listArea.appendChild(makeCard(h('div',{class:'empty'},'Sin vencimientos'))); return; }
    filtered.forEach(d=>{
      const diff=Math.ceil((new Date(d.dueDate)-now)/86400000);
      const urg=!d.paid&&diff<=5&&diff>=0;
      const over=!d.paid&&diff<0;
      const c=h('div',{class:'card card-pad',style:{marginBottom:'10px',border:`1.5px solid ${over?G.red+'66':urg?G.yellow+'66':G.border}`}});

      // Header
      const top=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px'}});
      const topLeft=h('div',{style:{flex:1}});
      topLeft.innerHTML=`
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px">
          <span style="font-weight:800;font-size:15px;text-decoration:${d.paid?'line-through':'none'};color:${d.paid?G.muted:G.text}">${d.name}</span>
          <span style="font-size:10px;background:${G.accentDim};color:${G.accent};border-radius:5px;padding:2px 7px;font-weight:700">${d.category}</span>
          ${over?`<span class="tag" style="background:${G.redDim};color:${G.red};border:1px solid ${G.red}30">VENCIDO</span>`:''}
          ${urg&&!over?`<span class="tag" style="background:${G.yellowDim};color:${G.yellow};border:1px solid ${G.yellow}30">${diff===0?'HOY':diff+'d'}</span>`:''}
        </div>
        <div style="font-size:11px;color:${G.muted}">📅 ${fmtDate(d.dueDate)}${d.bank?' · '+d.bank:''}</div>
        ${d.accountNumber?`<div style="font-size:11px;color:${G.muted};margin-top:2px">📋 Ref/Cuenta: <span style="font-weight:600">${d.accountNumber}</span></div>`:''}
        ${d.cuit?`<div style="font-size:11px;color:${G.muted};margin-top:1px">🪪 CUIT: <span style="font-weight:600">${d.cuit}</span></div>`:''}
        ${d.notes?`<div style="font-size:11px;color:${G.muted};margin-top:3px;font-style:italic">${d.notes}</div>`:''}`;
      const topRight=h('div',{style:{textAlign:'right',marginLeft:'10px',flexShrink:0}});
      topRight.innerHTML=`<div class="mono" style="font-weight:700;font-size:18px;color:${d.paid?G.muted:over?G.red:G.text}">${fmt(d.amount,d.currency)}</div>
        ${!d.paid?`<div style="font-size:10px;color:${over?G.red:G.muted};margin-top:2px">${over?Math.abs(diff)+'d atrás':diff===0?'Hoy':'En '+diff+'d'}</div>`:'<div style="font-size:10px;color:'+G.green+';margin-top:2px">✓ Pagado</div>'}`;
      top.append(topLeft,topRight);
      c.appendChild(top);

      // Botones
      const btnRow=h('div',{style:{display:'flex',gap:'6px'}});

      const toggleBtn=h('button',{
        style:{flex:1,background:d.paid?'var(--cardAlt)':G.greenDim,border:`1.5px solid ${d.paid?G.border:G.green}`,borderRadius:'9px',padding:'9px 0',color:d.paid?G.muted:G.green,fontSize:'12px',fontWeight:700},
        onClick:()=>{
          if(d.paid) {
            // Desmarcar — revertir movimiento si existe
            if(d.movementId) {
              const mov=DB.movements.find(m=>m.id===d.movementId);
              if(mov?.accountId) DB.accounts=DB.accounts.map(a=>a.id===mov.accountId?{...a,balance:a.balance+mov.amount}:a);
              DB.movements=DB.movements.filter(m=>m.id!==d.movementId);
            }
            DB.dues=DB.dues.map(x=>x.id===d.id?{...x,paid:false,movementId:null}:x);
            saveDB(DB); renderList();
          } else {
            openPagarVencimiento(d, renderList);
          }
        }
      },d.paid?'↩ Desmarcar':'✓ Pagado');

      const gcBtn=h('a',{
        href:gcalLink(d),target:'_blank',
        style:{display:'flex',alignItems:'center',justifyContent:'center',background:G.blueDim,border:`1.5px solid ${G.blue}44`,borderRadius:'9px',padding:'9px 12px',color:G.blue,fontSize:'12px',fontWeight:700,textDecoration:'none',whiteSpace:'nowrap'}
      },'📅 Cal');

      const editBtn=h('button',{
        style:{background:G.accentDim,border:`1.5px solid ${G.accent}44`,borderRadius:'9px',padding:'9px 12px',color:G.accent,fontSize:'13px',fontWeight:700},
        onClick:()=>openDueForm(renderList,d)
      },'✏️');

      const delBtn=h('button',{
        style:{background:G.redDim,border:`1.5px solid ${G.red}33`,borderRadius:'9px',padding:'9px 12px',color:G.red,fontSize:'13px',fontWeight:700},
        onClick:()=>{ if(!confirm(`¿Eliminar "${d.name}"?`))return; DB.dues=DB.dues.filter(x=>x.id!==d.id); saveDB(DB); renderList(); }
      },'✕');

      btnRow.append(toggleBtn,gcBtn,editBtn,delBtn);
      c.appendChild(btnRow);
      listArea.appendChild(c);
    });
  }

  ['pendientes','pagados','todos'].forEach(f=>{
    const btn=h('button',{class:'pill'+(filter===f?' active':''),onClick:()=>{ filter=f; pills.querySelectorAll('.pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderList(); }},f.charAt(0).toUpperCase()+f.slice(1));
    pills.appendChild(btn);
  });
  wrap.append(pills,listArea);
  renderList();

  fab.style.display='flex';
  fab.onclick=()=>openDueForm(renderList);
  return wrap;
}

function openDueForm(onSave, existing=null) {
  const CATS=['Impuesto','ABL','AFIP','Expensas','Tarjeta','Servicio','Alquiler','Seguro','Cuota','Otro'];
  let f=existing?{...existing}:{name:'',amount:'',currency:'ARS',dueDate:today(),category:'Impuesto',notes:'',bank:'',accountNumber:'',cuit:''};
  const body=h('div');

  const ni=makeInput({type:'text',placeholder:'Ej: ABL, AFIP Monotributo, Expensas...', value:f.name}); ni.oninput=e=>f.name=e.target.value;
  body.appendChild(makeField('Nombre',ni));

  const tc=h('div',{class:'two-col'});
  const ai=makeInput({type:'number',placeholder:'0',value:f.amount}); ai.oninput=e=>f.amount=e.target.value;
  tc.appendChild(h('div',{class:'col-2'},[makeField('Monto',ai)]));
  tc.appendChild(makeField('Moneda',makeSelect([['ARS','ARS $'],['USD','USD $']],f.currency,v=>f.currency=v)));
  body.appendChild(tc);

  const di=makeInput({type:'date',value:f.dueDate}); di.oninput=e=>f.dueDate=e.target.value;
  body.appendChild(makeField('Fecha de vencimiento',di));

  body.appendChild(makeField('Categoría',makeSelect(CATS.map(c=>[c,c]),f.category,v=>f.category=v)));

  // Campos adicionales para info de pago
  const bi=makeInput({type:'text',placeholder:'Ej: AFIP, Banco Ciudad, ARBA...',value:f.bank||''}); bi.oninput=e=>f.bank=e.target.value;
  body.appendChild(makeField('Entidad / Banco (opcional)',bi));

  const tc2=h('div',{class:'two-col'});
  const ri=makeInput({type:'text',placeholder:'Nro cuenta, patente, ref...',value:f.accountNumber||''}); ri.oninput=e=>f.accountNumber=e.target.value;
  const ci2=makeInput({type:'text',placeholder:'Ej: 20-12345678-9',value:f.cuit||''}); ci2.oninput=e=>f.cuit=e.target.value;
  tc2.appendChild(makeField('Nro cuenta / referencia',ri));
  tc2.appendChild(makeField('CUIT / CUIL',ci2));
  body.appendChild(tc2);

  const ti=h('textarea',{class:'inp',placeholder:'Notas adicionales...'}); ti.style.cssText='resize:none;height:56px'; ti.value=f.notes||''; ti.oninput=e=>f.notes=e.target.value;
  body.appendChild(makeField('Notas (opcional)',ti));

  // Preview del link de Google Calendar
  const previewDiv=h('div',{style:{background:G.blueDim,borderRadius:'10px',padding:'10px 12px',fontSize:'11px',color:G.blue,marginBottom:'4px'}});
  previewDiv.innerHTML=`📅 Al guardar podrás agregar este vencimiento a <strong>Google Calendar</strong> con todos los datos desde la lista.`;
  body.appendChild(previewDiv);

  const br=h('div',{class:'btn-row'});
  br.appendChild(makeBtn('Cancelar',closeModal,'ghost'));
  br.appendChild(makeBtn(existing?'Guardar cambios':'Guardar',()=>{
    if(!f.name||!f.dueDate) return;
    const due={...f,amount:Number(f.amount),paid:existing?existing.paid:false};
    if(existing) {
      DB.dues=DB.dues.map(x=>x.id===existing.id?{...due,id:existing.id}:x);
    } else {
      due.id=uid();
      DB.dues.push(due);
    }
    saveDB(DB); closeModal(); onSave();
    // Ofrecer agregar a Google Calendar automáticamente
    setTimeout(()=>{
      const gcUrl=gcalLinkFromDue(due);
      const toast=h('div',{style:{position:'fixed',bottom:'90px',left:'50%',transform:'translateX(-50%)',background:'#1a1a2e',color:'#fff',borderRadius:'14px',padding:'14px 18px',zIndex:9999,boxShadow:'0 4px 20px rgba(0,0,0,.3)',maxWidth:'320px',width:'90%',fontSize:'13px'}});
      toast.innerHTML=`<div style="font-weight:700;margin-bottom:8px">✅ Vencimiento guardado</div>
        <div style="font-size:12px;color:rgba(255,255,255,.7);margin-bottom:10px">¿Lo agregás a Google Calendar para recibir recordatorios automáticos?</div>
        <div style="display:flex;gap:8px">
          <a href="${gcUrl}" target="_blank" onclick="document.body.removeChild(toast)" style="flex:1;background:#4285f4;color:#fff;border:none;border-radius:9px;padding:'9px 0';font-weight:700;font-size:13px;text-decoration:none;text-align:center;padding:9px 0">📅 Sí, agregar</a>
          <button onclick="this.closest('div[style]').remove()" style="flex:1;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:9px;padding:9px 0;font-weight:700;font-size:13px;cursor:pointer">Ahora no</button>
        </div>`;
      document.body.appendChild(toast);
      setTimeout(()=>{ if(toast.parentNode) toast.remove(); },10000);
    },300);
  },'primary',{full:true}));
  body.appendChild(br);
  openModal(existing?'Editar vencimiento':'Nuevo vencimiento',body);
}

// ─── INVERSIONES ─────────────────────────────────────────────────────────────
function inversiones() {
  const wrap=h('div');
  const TIPOS=['FCI - Mercado de Dinero','FCI - Renta Fija','FCI - Renta Variable','Plazo Fijo','Acciones','Cripto','Bono','Otro'];
  const LIQUIDEZ=['Inmediato','24hs hábiles','48hs hábiles','72hs hábiles','Al vencimiento'];
  const INV_COLORS=['#4a7c62','#5a6a85','#9a7d3a','#6b6b8b','#4b5563','#7c5a6b','#5a7a5a','#7a6a4a'];

  function renderList() {
    listArea.innerHTML='';

    // Totales
    const totalARS=DB.inversiones.filter(i=>i.currency==='ARS').reduce((s,i)=>s+i.currentAmount,0);
    const totalUSD=DB.inversiones.filter(i=>i.currency==='USD').reduce((s,i)=>s+i.currentAmount,0);
    const ganARS=DB.inversiones.filter(i=>i.currency==='ARS').reduce((s,i)=>s+(i.currentAmount-i.initialAmount),0);
    const ganUSD=DB.inversiones.filter(i=>i.currency==='USD').reduce((s,i)=>s+(i.currentAmount-i.initialAmount),0);

    if(DB.inversiones.length>0) {
      const summary=h('div',{style:{background:`linear-gradient(135deg,${G.green},#2d6b4a)`,borderRadius:'16px',padding:'18px',marginBottom:'14px',color:'#fff'}});
      summary.innerHTML=`
        <div style="font-size:10px;color:rgba(255,255,255,.7);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">Total invertido</div>
        ${totalARS>0?`<div class="mono" style="font-size:24px;font-weight:600">${fmt(totalARS)}</div>
        <div style="font-size:13px;color:rgba(255,255,255,.8);margin-top:2px">Rendimiento: <span class="mono" style="color:${ganARS>=0?'#a8f0c6':'#ffaaaa'};font-weight:700">${ganARS>=0?'+':''}${fmt(ganARS)}</span></div>`:''}
        ${totalUSD>0?`<div class="mono" style="font-size:${totalARS>0?'16px':'24px'};font-weight:600;margin-top:${totalARS>0?'8px':'0'}">${fmt(totalUSD,'USD')}</div>
        <div style="font-size:13px;color:rgba(255,255,255,.8);margin-top:2px">Rendimiento USD: <span class="mono" style="color:${ganUSD>=0?'#a8f0c6':'#ffaaaa'};font-weight:700">${ganUSD>=0?'+':''}${fmt(ganUSD,'USD')}</span></div>`:''}
        <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:8px">${DB.inversiones.length} inversión${DB.inversiones.length>1?'es':''}</div>`;
      listArea.appendChild(summary);
    }

    if(DB.inversiones.length===0) {
      listArea.appendChild(makeCard(h('div',{class:'empty'},'Todavía no tenés inversiones cargadas 📈')));
    } else {
      DB.inversiones.forEach(inv=>{
        const ganancia=inv.currentAmount-inv.initialAmount;
        const pct=inv.initialAmount>0?((ganancia/inv.initialAmount)*100).toFixed(2):0;
        const col=inv.color||G.green;
        const c=h('div',{class:'card card-pad',style:{marginBottom:'12px',border:`1.5px solid ${col}33`}});

        // Header
        const hdr=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px'}});
        hdr.innerHTML=`<div>
          <div style="font-weight:800;font-size:16px;color:${col}">${inv.name}</div>
          <div style="font-size:11px;color:${G.muted};margin-top:2px">${inv.type}${inv.liquidity?' · '+inv.liquidity:''}</div>
        </div>
        <div style="text-align:right">
          <div class="mono" style="font-size:20px;font-weight:700">${fmt(inv.currentAmount,inv.currency)}</div>
          <div style="font-size:12px;color:${ganancia>=0?G.green:G.red};font-weight:700;margin-top:1px">${ganancia>=0?'+':''}${fmt(ganancia,inv.currency)} (${pct}%)</div>
        </div>`;
        c.appendChild(hdr);

        // Info row
        const infoRow=h('div',{style:{display:'flex',gap:'8px',marginBottom:'12px',flexWrap:'wrap'}});
        infoRow.innerHTML=`
          <span style="font-size:11px;background:${col}12;color:${col};border:1px solid ${col}22;border-radius:6px;padding:3px 8px;font-weight:600">Invertido: ${fmt(inv.initialAmount,inv.currency)}</span>
          ${inv.lastUpdated?`<span style="font-size:11px;background:${G.accentDim};color:${G.muted};border-radius:6px;padding:3px 8px">Actualizado: ${fmtDate(inv.lastUpdated)}</span>`:''}`;
        c.appendChild(infoRow);

        // Botones de acción
        const btnRow=h('div',{style:{display:'flex',gap:'7px'}});

        // Actualizar valor
        const updBtn=h('button',{
          style:{flex:1,background:G.accentDim,border:`1.5px solid ${G.accent}44`,borderRadius:'9px',padding:'9px 0',color:G.accent,fontSize:'12px',fontWeight:700},
          onClick:()=>openActualizarValor(inv, renderList)
        },'✏️ Actualizar');

        // Invertir más
        const addBtn=h('button',{
          style:{flex:1,background:col+'14',border:`1.5px solid ${col}33`,borderRadius:'9px',padding:'9px 0',color:col,fontSize:'12px',fontWeight:700},
          onClick:()=>openInvertirMas(inv, renderList)
        },'➕ Invertir más');

        // Rescatar
        const rescBtn=h('button',{
          style:{flex:1,background:G.greenDim,border:`1.5px solid ${G.green}33`,borderRadius:'9px',padding:'9px 0',color:G.green,fontSize:'12px',fontWeight:700},
          onClick:()=>openRescatar(inv, renderList)
        },'💰 Rescatar');

        // Eliminar
        const delBtn=h('button',{
          style:{background:G.redDim,border:`1.5px solid ${G.red}33`,borderRadius:'9px',padding:'9px 12px',color:G.red,fontSize:'13px',fontWeight:700},
          onClick:()=>{ if(confirm(`¿Eliminar ${inv.name}?`)){ DB.inversiones=DB.inversiones.filter(x=>x.id!==inv.id); saveDB(DB); renderList(); } }
        },'✕');

        btnRow.append(updBtn, addBtn, rescBtn, delBtn);
        c.appendChild(btnRow);
        listArea.appendChild(c);
      });
    }
  }

  const listArea=h('div');
  wrap.appendChild(listArea);
  renderList();

  fab.style.display='flex';
  fab.onclick=()=>openNuevaInversion(renderList);

  // ── Nueva inversión ──────────────────────────────────────────────────────
  function openNuevaInversion(onSave) {
    let f={name:'',type:TIPOS[0],liquidity:LIQUIDEZ[0],initialAmount:'',currentAmount:'',currency:'ARS',color:INV_COLORS[0],notes:''};
    const body=h('div');
    function rb(){
      body.innerHTML='';
      const ni=makeInput({type:'text',placeholder:'Ej: Super Ahorro Plus, Plazo Fijo Galicia...'}); ni.oninput=e=>f.name=e.target.value;
      body.appendChild(makeField('Nombre',ni));
      body.appendChild(makeField('Tipo',makeSelect(TIPOS.map(t=>[t,t]),f.type,v=>f.type=v)));
      body.appendChild(makeField('Liquidez',makeSelect(LIQUIDEZ.map(l=>[l,l]),f.liquidity,v=>f.liquidity=v)));
      const tc=h('div',{class:'two-col'});
      const ii=makeInput({type:'number',placeholder:'Monto invertido',value:f.initialAmount}); ii.oninput=e=>{ f.initialAmount=e.target.value; f.currentAmount=e.target.value; };
      tc.appendChild(h('div',{class:'col-2'},[makeField('Monto inicial',ii)]));
      tc.appendChild(makeField('Moneda',makeSelect([['ARS','ARS $'],['USD','USD $']],f.currency,v=>f.currency=v)));
      body.appendChild(tc);
      // Valor actual (puede ser distinto si ya tiene rendimiento)
      const ci=makeInput({type:'number',placeholder:'Valor actual',value:f.currentAmount}); ci.oninput=e=>f.currentAmount=e.target.value;
      body.appendChild(makeField('Valor actual (si ya tiene rendimiento)',ci));
      // Color
      const cg=h('div',{class:'color-grid'});
      INV_COLORS.forEach(c=>{ const d=h('div',{class:'color-dot'+(f.color===c?' selected':''),style:{background:c},onClick:()=>{ f.color=c; rb(); }}); cg.appendChild(d); });
      body.appendChild(makeField('Color',cg));
      const ti=h('textarea',{class:'inp',placeholder:'Notas opcionales...'}); ti.style.cssText='resize:none;height:56px'; ti.oninput=e=>f.notes=e.target.value;
      body.appendChild(makeField('Notas',ti));
      const br=h('div',{class:'btn-row'});
      br.appendChild(makeBtn('Cancelar',closeModal,'ghost'));
      br.appendChild(makeBtn('Guardar',()=>{
        if(!f.name||!f.initialAmount)return;
        DB.inversiones.push({...f,id:uid(),initialAmount:Number(f.initialAmount),currentAmount:Number(f.currentAmount||f.initialAmount),lastUpdated:today()});
        saveDB(DB); closeModal(); onSave();
      },'primary',{full:true}));
      body.appendChild(br);
    }
    rb();
    openModal('Nueva inversión',body);
  }

  // ── Actualizar valor actual ──────────────────────────────────────────────
  function openActualizarValor(inv, onSave) {
    let newVal=inv.currentAmount;
    const body=h('div');
    body.innerHTML=`<div style="text-align:center;margin-bottom:16px">
      <div style="font-weight:800;font-size:16px;color:${inv.color||G.green}">${inv.name}</div>
      <div style="font-size:12px;color:${G.muted};margin-top:4px">Valor anterior: <span class="mono">${fmt(inv.currentAmount,inv.currency)}</span></div>
    </div>`;
    const vi=makeInput({type:'number',placeholder:'Nuevo valor',value:inv.currentAmount}); vi.oninput=e=>newVal=e.target.value;
    body.appendChild(makeField('Nuevo valor actual',vi));
    const br=h('div',{class:'btn-row'});
    br.appendChild(makeBtn('Cancelar',closeModal,'ghost'));
    br.appendChild(makeBtn('Actualizar',()=>{
      DB.inversiones=DB.inversiones.map(x=>x.id===inv.id?{...x,currentAmount:Number(newVal),lastUpdated:today()}:x);
      saveDB(DB); closeModal(); onSave();
    },'primary',{full:true}));
    body.appendChild(br);
    openModal('Actualizar valor',body);
  }

  // ── Invertir más ────────────────────────────────────────────────────────
  function openInvertirMas(inv, onSave) {
    let extra='', selectedAcc='';
    const body=h('div');
    body.innerHTML=`<div style="text-align:center;margin-bottom:16px">
      <div style="font-weight:800;font-size:16px;color:${inv.color||G.green}">${inv.name}</div>
      <div style="font-size:12px;color:${G.muted};margin-top:4px">Saldo actual: <span class="mono">${fmt(inv.currentAmount,inv.currency)}</span></div>
    </div>`;
    const ei=makeInput({type:'number',placeholder:'¿Cuánto más invertís?'}); ei.oninput=e=>extra=e.target.value;
    body.appendChild(makeField('Monto adicional',ei));
    const accSel=makeSelect([['','Sin descontar de cuenta'],...DB.accounts.map(a=>[a.id,`${a.name} (${fmt(a.balance,a.currency)})`])],'',v=>selectedAcc=v);
    body.appendChild(makeField('Descontar de cuenta',accSel));
    const br=h('div',{class:'btn-row'});
    br.appendChild(makeBtn('Cancelar',closeModal,'ghost'));
    br.appendChild(makeBtn('Confirmar',()=>{
      if(!extra||Number(extra)<=0)return;
      const monto=Number(extra);
      DB.inversiones=DB.inversiones.map(x=>x.id===inv.id?{...x,initialAmount:x.initialAmount+monto,currentAmount:x.currentAmount+monto,lastUpdated:today()}:x);
      if(selectedAcc) {
        DB.accounts=DB.accounts.map(a=>a.id===selectedAcc?{...a,balance:a.balance-monto}:a);
        DB.movements.push({id:uid(),type:'gasto',description:`Inversión: ${inv.name}`,amount:monto,currency:inv.currency,date:today(),accountId:selectedAcc,categoryId:''});
      }
      saveDB(DB); closeModal(); onSave();
    },'primary',{full:true}));
    body.appendChild(br);
    openModal('Invertir más',body);
  }

  // ── Rescatar ────────────────────────────────────────────────────────────
  function openRescatar(inv, onSave) {
    let monto=inv.currentAmount, selectedAcc='';
    const body=h('div');
    const ganancia=inv.currentAmount-inv.initialAmount;
    body.innerHTML=`<div style="text-align:center;margin-bottom:16px">
      <div style="font-size:32px;margin-bottom:6px">💰</div>
      <div style="font-weight:800;font-size:16px;color:${inv.color||G.green}">${inv.name}</div>
      <div class="mono" style="font-size:22px;font-weight:700;margin-top:4px">${fmt(inv.currentAmount,inv.currency)}</div>
      ${ganancia!==0?`<div style="font-size:13px;color:${ganancia>=0?G.green:G.red};font-weight:700;margin-top:2px">${ganancia>=0?'+':''}${fmt(ganancia,inv.currency)} de rendimiento</div>`:''}
    </div>
    <div style="background:${G.greenDim};border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;color:${G.textSoft}">
      ✅ El monto rescatado se acreditará en la cuenta que elijas como <strong>ingreso</strong>.
    </div>`;
    const mi=makeInput({type:'number',placeholder:'Monto a rescatar',value:inv.currentAmount}); mi.oninput=e=>monto=e.target.value;
    body.appendChild(makeField('Monto a rescatar',mi));
    const accSel=makeSelect([['','No acreditar en cuenta'],...DB.accounts.map(a=>[a.id,`${a.name} (${fmt(a.balance,a.currency)})`])],'',v=>selectedAcc=v);
    body.appendChild(makeField('Acreditar en cuenta',accSel));
    const br=h('div',{class:'btn-row'});
    br.appendChild(makeBtn('Cancelar',closeModal,'ghost'));
    br.appendChild(makeBtn('Confirmar rescate',()=>{
      if(!monto||Number(monto)<=0)return;
      const montoNum=Number(monto);
      const esTotal=montoNum>=inv.currentAmount;
      if(esTotal) {
        DB.inversiones=DB.inversiones.filter(x=>x.id!==inv.id);
      } else {
        const proporcion=montoNum/inv.currentAmount;
        const invInicial=inv.initialAmount*proporcion;
        DB.inversiones=DB.inversiones.map(x=>x.id===inv.id?{...x,initialAmount:x.initialAmount-invInicial,currentAmount:x.currentAmount-montoNum,lastUpdated:today()}:x);
      }
      if(selectedAcc) {
        DB.accounts=DB.accounts.map(a=>a.id===selectedAcc?{...a,balance:a.balance+montoNum}:a);
        DB.movements.push({id:uid(),type:'ingreso',description:`Rescate: ${inv.name}`,amount:montoNum,currency:inv.currency,date:today(),accountId:selectedAcc,categoryId:''});
      }
      saveDB(DB); closeModal(); onSave();
    },'primary',{full:true}));
    body.appendChild(br);
    openModal(`Rescatar · ${inv.name}`,body);
  }

  return wrap;
}

// ─── NOTIFICACIONES ──────────────────────────────────────────────────────────
function openNotifSetup() {
  const body=h('div');
  const supported='Notification' in window && 'serviceWorker' in navigator;
  const granted=supported && Notification.permission==='granted';
  const denied=supported && Notification.permission==='denied';

  const statusDiv=h('div',{style:{borderRadius:'12px',padding:'14px',marginBottom:'16px',fontSize:'13px',lineHeight:'1.6',
    background: granted?G.greenDim:denied?G.redDim:G.yellowDim,
    border:`1px solid ${granted?G.green:denied?G.red:G.yellow}33`,
    color: granted?G.green:denied?G.red:G.yellow
  }});

  if(!supported) {
    statusDiv.innerHTML=`<strong>⚠️ Tu navegador no soporta notificaciones.</strong><br>Instalá la app como PWA desde Safari (iPhone) o Chrome (Android) para activarlas.`;
  } else if(denied) {
    statusDiv.innerHTML=`<strong>🔕 Notificaciones bloqueadas.</strong><br>Para activarlas andá a Configuración del celular → Safari/Chrome → Notificaciones → Mis Finanzas → Permitir.`;
  } else if(granted) {
    statusDiv.innerHTML=`<strong>🔔 Notificaciones activadas ✓</strong><br>La app te va a avisar el día anterior y el día del vencimiento de cada impuesto o pago.`;
  } else {
    statusDiv.innerHTML=`<strong>🔔 Activar notificaciones</strong><br>La app te puede avisar automáticamente el día anterior y el día de cada vencimiento.`;
  }
  body.appendChild(statusDiv);

  // Explicación de cómo funciona
  const infoDiv=h('div',{style:{background:G.accentDim,borderRadius:'10px',padding:'12px',marginBottom:'16px',fontSize:'12px',color:G.textSoft,lineHeight:'1.6'}});
  infoDiv.innerHTML=`<strong>¿Cómo funciona?</strong><br>
    📅 <strong>Google Calendar</strong>: al guardar un vencimiento te pregunta si lo agregás al calendario. Desde ahí Google te manda notif por mail y cel.<br><br>
    🔔 <strong>Notificación directa</strong>: si instalás la app en el celular (PWA), te avisa aunque no tengas la app abierta — el día anterior y el mismo día del vencimiento.`;
  body.appendChild(infoDiv);

  if(supported && !denied) {
    if(!granted) {
      const activarBtn=h('button',{class:'btn btn-primary btn-full',style:{fontSize:'15px',padding:'14px',marginBottom:'10px'}},'🔔 Activar notificaciones');
      activarBtn.onclick=async()=>{
        const ok=await window.requestNotifPermission();
        if(ok) { closeModal(); setTimeout(()=>openNotifSetup(),100); window.checkDuesNow(); }
        else { activarBtn.textContent='❌ No se pudo activar'; }
      };
      body.appendChild(activarBtn);
    } else {
      const testBtn=h('button',{class:'btn btn-full',style:{fontSize:'14px',padding:'12px',background:G.greenDim,color:G.green,border:`1.5px solid ${G.green}44`,borderRadius:'11px',marginBottom:'10px'}},'🧪 Probar notificación ahora');
      testBtn.onclick=()=>{
        window.checkDuesNow();
        new Notification('✅ Mis Finanzas',{body:'Las notificaciones funcionan correctamente.',icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💰</text></svg>'});
      };
      body.appendChild(testBtn);
    }
  }

  // Instrucciones PWA
  const pwaDiv=h('div',{style:{background:G.yellowDim,borderRadius:'10px',padding:'12px',fontSize:'12px',color:G.yellow,lineHeight:'1.6'}});
  pwaDiv.innerHTML=`<strong>📱 Para instalar como app:</strong><br>
    <strong>iPhone:</strong> Abrí en Safari → compartir 📤 → "Añadir a pantalla de inicio"<br>
    <strong>Android:</strong> Abrí en Chrome → menú ⋮ → "Añadir a pantalla de inicio"`;
  body.appendChild(pwaDiv);

  openModal('Recordatorios 🔔',body);
}

// ─── BACKUP / RESTORE ────────────────────────────────────────────────────────
function openBackupModal() {
  const body=h('div');

  const info=h('div',{style:{background:G.accentDim,borderRadius:'12px',padding:'12px',marginBottom:'16px',fontSize:'12px',color:G.textSoft,lineHeight:'1.6'}});
  info.innerHTML=`<strong>📤 Exportar</strong> → descarga un archivo <code>.json</code> con todos tus datos.<br>
    <strong>📂 Importar</strong> → cargá un archivo exportado para restaurar todo.<br><br>
    <span style="color:${G.yellow};font-weight:700">📁 El archivo se guarda en la carpeta <strong>Descargas</strong> de tu dispositivo.</span>`;
  body.appendChild(info);

  const stats=h('div',{style:{background:G.greenDim,borderRadius:'10px',padding:'10px 12px',marginBottom:'16px',fontSize:'12px',color:G.green,fontWeight:600}});
  stats.innerHTML=`📊 Datos actuales: <strong>${DB.movements.length}</strong> movimientos · <strong>${DB.cards.length}</strong> tarjetas · <strong>${DB.inversiones?.length||0}</strong> inversiones · <strong>${DB.dues?.length||0}</strong> vencimientos`;
  body.appendChild(stats);

  // Exportar
  const expBtn=h('button',{class:'btn btn-primary btn-full',style:{marginBottom:'10px',fontSize:'15px',padding:'14px'}},'📤 Exportar mis datos');
  expBtn.onclick=()=>{
    const dataStr=JSON.stringify(DB,null,2);
    const blob=new Blob([dataStr],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`mis-finanzas-${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    expBtn.textContent='✅ ¡Descargado!';
    expBtn.style.background=G.green;
    setTimeout(()=>{ expBtn.textContent='📤 Exportar mis datos'; expBtn.style.background=''; },3000);
  };
  body.appendChild(expBtn);

  const sep=h('div',{style:{textAlign:'center',color:G.muted,fontSize:'12px',margin:'6px 0 10px'}});
  sep.textContent='— o —';
  body.appendChild(sep);

  // Importar
  const fileInp=document.createElement('input');
  fileInp.type='file'; fileInp.accept='.json'; fileInp.style.display='none';
  fileInp.onchange=e=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const parsed=JSON.parse(ev.target.result);
        if(!parsed.movements||!parsed.cards||!parsed.categories){ alert('Archivo inválido. No parece un backup de Mis Finanzas.'); return; }
        if(!parsed.installmentGroups) parsed.installmentGroups=[];
        if(!parsed.cardPayments) parsed.cardPayments=[];
        if(!parsed.cardDueDates) parsed.cardDueDates={};
        if(!parsed.inversiones) parsed.inversiones=[];
        if(!parsed.dues) parsed.dues=[];
        if(!confirm(`¿Restaurar backup?\n${parsed.movements.length} movimientos, ${parsed.cards.length} tarjetas.\n\n⚠️ Reemplazará todos los datos actuales.`)) return;
        Object.assign(DB,parsed);
        saveDB(DB);
        closeModal();
        navigate('resumen');
      } catch(err){ alert('Error al leer el archivo. Verificá que sea un backup válido.'); }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(fileInp);

  const impBtn=h('button',{class:'btn btn-full',style:{fontSize:'15px',padding:'14px',background:G.accentDim,color:G.accent,border:`2px dashed ${G.accent}`,borderRadius:'11px'}},'📂 Importar backup');
  impBtn.onclick=()=>fileInp.click();
  body.appendChild(impBtn);

  const warn=h('div',{style:{marginTop:'14px',fontSize:'11px',color:G.muted,textAlign:'center',lineHeight:'1.5'}});
  warn.textContent='💡 Tip: guardá el .json en Google Drive o iCloud para no perderlo.';
  body.appendChild(warn);

  // Resetear app
  const sep2=h('div',{style:{textAlign:'center',color:G.muted,fontSize:'12px',margin:'14px 0 10px',borderTop:`1px solid ${G.border}`,paddingTop:'14px'}});
  sep2.textContent='— zona peligrosa —';
  body.appendChild(sep2);

  const resetBtn=h('button',{
    class:'btn btn-full',
    style:{fontSize:'14px',padding:'12px',background:G.redDim,color:G.red,border:`2px solid ${G.red}44`,borderRadius:'11px'},
    onClick:()=>{
      if(!confirm('⚠️ ¿Borrar TODOS los datos y empezar de cero?\n\nEsto no se puede deshacer. Asegurate de haber exportado el backup antes.')) return;
      localStorage.removeItem('finanzas_db');
      closeModal();
      location.reload();
    }
  },'🗑️ Resetear app (borrar todo)');
  body.appendChild(resetBtn);

  openModal('Backup de datos 💾',body);
}

try {
  renderNav();
  renderContent();
} catch(e) {
  document.body.innerHTML = '<div style="padding:20px;font-family:sans-serif"><h2>Error al cargar</h2><pre style="font-size:12px;color:red;white-space:pre-wrap">' + e.stack + '</pre></div>';
}

// Chequear vencimientos al abrir la app
setTimeout(()=>{ if(window.checkDuesNow) window.checkDuesNow(); }, 2000);
</script>
</body>
</html>
