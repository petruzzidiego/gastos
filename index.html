<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#4b5563"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Mis Finanzas"/>
  <title>Mis Finanzas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
  // Notificaciones locales — sin service worker (compatible con móvil)
  window.requestNotifPermission = async function() {
    if(!('Notification' in window)) return false;
    const perm = await Notification.requestPermission();
    return perm === 'granted';
  };

  window.checkDuesNow = function() {
    if(!('Notification' in window) || Notification.permission !== 'granted') return;
    try {
      const db = JSON.parse(localStorage.getItem('finanzas_db') || '{}');
      const dues = db.dues || [];
      const today = new Date().toISOString().split('T')[0];
      const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
      dues.filter(d => !d.paid).forEach(d => {
        if(d.dueDate === today) {
          new Notification('🚨 Vence HOY: ' + d.name, {
            body: 'Monto: $' + Number(d.amount).toLocaleString('es-AR') + (d.bank ? ' · ' + d.bank : ''),
            tag: 'due-today-' + d.id
          });
        } else if(d.dueDate === tomorrow) {
          new Notification('💸 Vence mañana: ' + d.name, {
            body: 'Monto: $' + Number(d.amount).toLocaleString('es-AR') + (d.bank ? ' · ' + d.bank : ''),
            tag: 'due-' + d.id
          });
        }
      });
    } catch(e) {}
  };
  </script>
  <style>
    :root {
      --bg:#f1f1f1; --card:#fff; --cardAlt:#f5f5f5; --border:#e0e0e0;
      --accent:#4b5563; --accentDim:rgba(75,85,99,0.08); --accentDark:#374151;
      --red:#b45757; --redDim:rgba(180,87,87,0.08);
      --yellow:#9a7d3a; --yellowDim:rgba(154,125,58,0.08);
      --green:#4a7c62; --greenDim:rgba(74,124,98,0.08);
      --blue:#5a6a85; --blueDim:rgba(90,106,133,0.08);
      --text:#1c1c1c; --textSoft:#4a4a4a; --muted:#9a9a9a;
      --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
      --r:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overscroll-behavior:none}
    button,input,select,textarea{font-family:inherit;font-size:14px}
    button{cursor:pointer;border:none;background:none}
    .mono{font-family:'JetBrains Mono',monospace}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fade{animation:fadeUp .2s ease}

    /* Layout */
    #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}
    #header{padding:16px 16px 12px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40;box-shadow:0 1px 8px rgba(0,0,0,.06)}
    #header-inner{display:flex;justify-content:space-between;align-items:center}
    #header-label{font-size:10px;color:var(--accent);font-weight:800;letter-spacing:2px;text-transform:uppercase}
    #header-title{font-size:21px;font-weight:800;color:var(--text)}
    #header-icon{width:38px;height:38px;border-radius:12px;background:var(--accentDim);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--accent)}
    #content{padding:14px 14px 100px}
    #bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:60;padding-bottom:env(safe-area-inset-bottom,6px);box-shadow:0 -2px 12px rgba(0,0,0,.07)}
    .nav-btn{flex:1;padding:7px 0 5px;display:flex;flex-direction:column;align-items:center;gap:1px;background:none;border:none}
    .nav-icon{font-size:15px;color:var(--muted)}
    .nav-icon.active{color:var(--accent)}
    .nav-label{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:.2px}
    .nav-label.active{color:var(--accent)}
    .nav-dot{width:14px;height:2px;background:var(--accent);border-radius:2px;margin-top:1px}

    /* Cards */
    .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:10px}
    .card-pad{padding:14px}

    /* Inputs */
    .inp{width:100%;background:var(--cardAlt);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;appearance:none}
    .inp:focus{border-color:var(--accent)}
    .field{margin-bottom:13px}
    .field-label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}

    /* Buttons */
    .btn{border-radius:11px;padding:11px 18px;font-weight:700;font-size:14px;transition:opacity .15s;border:none}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .btn-ghost{background:transparent;color:var(--textSoft);border:1.5px solid var(--border)}
    .btn-danger{background:var(--red);color:#fff}
    .btn-sm{padding:7px 13px;font-size:13px}
    .btn-full{width:100%}
    .btn:active{opacity:.7}
    .btn:disabled{opacity:.4;pointer-events:none}
    .btn-row{display:flex;gap:8px;margin-top:4px}

    /* Pills */
    .pill{border-radius:20px;padding:5px 13px;font-size:12px;font-weight:700;white-space:nowrap;border:1.5px solid var(--border);background:#fff;color:var(--textSoft);transition:all .2s}
    .pill.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
    .pills::-webkit-scrollbar{height:0}

    /* Tags */
    .tag{display:inline-block;border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700;letter-spacing:.3px}

    /* FAB */
    #fab{position:fixed;bottom:76px;right:18px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;font-size:26px;box-shadow:0 4px 18px rgba(0,0,0,.35);z-index:50;display:flex;align-items:center;justify-content:center;border:none;line-height:1}
    #fab:active{opacity:.8}

    /* Modal */
    #modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.35);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:flex-end;justify-content:center;display:none}
    #modal-overlay.open{display:flex}
    #modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 -4px 30px rgba(0,0,0,.12)}
    #modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 0}
    #modal-title{font-weight:800;font-size:17px;color:var(--text)}
    #modal-close{background:var(--bg);border:none;color:var(--muted);width:30px;height:30px;border-radius:8px;font-size:18px;display:flex;align-items:center;justify-content:center}
    #modal-body{padding:18px}

    /* Hero */
    .hero{background:linear-gradient(135deg,#4b5563,#1f2937);border-radius:20px;padding:22px 20px;margin-bottom:14px;box-shadow:0 6px 24px rgba(0,0,0,.25)}
    .hero-sub{font-size:11px;color:rgba(255,255,255,.75);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
    .hero-amount{font-size:34px;font-weight:500;color:#fff}
    .hero-boxes{display:flex;gap:10px;margin-top:16px}
    .hero-box{flex:1;background:rgba(255,255,255,.18);border-radius:12px;padding:10px 13px}
    .hero-box-label{font-size:10px;color:rgba(255,255,255,.7);font-weight:700}
    .hero-box-val{font-size:14px;color:#fff;margin-top:2px}

    /* Stat boxes */
    .stat-row{display:flex;gap:8px;margin-bottom:14px}
    .stat-box{flex:1;border-radius:12px;padding:10px 12px;border:1px solid var(--border)}
    .stat-label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
    .stat-val{font-size:14px;margin-top:3px;font-weight:500}

    /* Section labels */
    .sec-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}

    /* Movement row */
    .mov-row{display:flex;align-items:center;gap:10px}
    .mov-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .mov-info{flex:1;min-width:0}
    .mov-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mov-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
    .mov-amount{font-weight:700;font-size:14px;flex-shrink:0}
    .del-btn{width:26px;height:26px;border-radius:7px;border:none;font-size:13px;display:flex;align-items:center;justify-content:center;background:var(--redDim);color:var(--red)}

    /* Color pickers */
    .color-grid{display:flex;gap:8px;flex-wrap:wrap}
    .color-dot{width:32px;height:32px;border-radius:9px;border:3px solid transparent;cursor:pointer}
    .color-dot.selected{border-color:#1c1c1c}

    /* Icon picker */
    .icon-grid{display:flex;flex-wrap:wrap;gap:6px}
    .icon-btn{width:38px;height:38px;border-radius:9px;background:#f8fafc;border:1.5px solid var(--border);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .icon-btn.selected{background:var(--accentDim);border-color:var(--accent)}

    /* Cat badge row */
    .cat-grid{display:flex;flex-wrap:wrap;gap:6px}
    .cat-pick-btn{border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:#f8fafc;color:var(--textSoft);cursor:pointer}
    .cat-pick-btn.selected{border-color:currentColor}

    /* Spinner */
    .spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}

    /* Charts */
    .chart-wrap{position:relative;height:210px}

    /* Accounts scroll */
    .accounts-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
    .accounts-scroll::-webkit-scrollbar{height:0}
    .account-card{min-width:148px;background:#fff;border-radius:14px;padding:12px 14px;flex-shrink:0;box-shadow:var(--shadow)}

    /* Progress bar */
    .progress-bg{background:var(--bg);border-radius:6px;height:7px;overflow:hidden;margin-bottom:10px}
    .progress-fill{height:100%;border-radius:6px;transition:width .4s}

    /* Table-like rows */
    .table-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}

    /* Empty state */
    .empty{padding:36px;text-align:center;color:var(--muted);font-size:13px}

    /* Two col */
    .two-col{display:flex;gap:10px}
    .two-col > *{flex:1}
    .col-2{flex:2!important}
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-inner">
      <div>
        <div id="header-label">Mis Finanzas</div>
        <div id="header-title">Inicio</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="backup-btn" onclick="openBackupModal()" style="width:38px;height:38px;border-radius:12px;background:var(--accentDim);border:none;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent);cursor:pointer" title="Exportar / Importar datos">💾</button>
        <button id="notif-btn" onclick="openNotifSetup()" style="width:38px;height:38px;border-radius:12px;background:var(--accentDim);border:none;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent);cursor:pointer" title="Recordatorios">🔔</button>
        <div id="header-icon">◈</div>
      </div>
    </div>
  </div>
  <div id="content"></div>
  <nav id="bottom-nav"></nav>
</div>

<button id="fab" style="display:none">+</button>

<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-header">
      <span id="modal-title"></span>
      <button id="modal-close">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ─── THEME ───────────────────────────────────────────────────────────────────
const G = {
  accent:'#4b5563',accentDim:'rgba(75,85,99,0.08)',accentDark:'#374151',
  red:'#b45757',redDim:'rgba(180,87,87,0.08)',
  yellow:'#9a7d3a',yellowDim:'rgba(154,125,58,0.08)',
  green:'#4a7c62',greenDim:'rgba(74,124,98,0.08)',
  blue:'#5a6a85',blueDim:'rgba(90,106,133,0.08)',
  text:'#1c1c1c',textSoft:'#4a4a4a',muted:'#9a9a9a',
  bg:'#f1f1f1',card:'#fff',border:'#e0e0e0'
};
const PALETTE = ['#4b5563','#4a7c62','#9a7d3a','#b45757','#6b6b8b','#6b7280','#5a6a85','#7c6b7c','#5a7a5a','#7a6a4a'];

// ─── UTILS ───────────────────────────────────────────────────────────────────
const fmt = (n,cur='ARS') => new Intl.NumberFormat('es-AR',{style:'currency',currency:cur,maximumFractionDigits:0}).format(n||0);
const fmtDate = d => { if(!d)return''; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; };
const today = () => new Date().toISOString().split('T')[0];
const monthKey = (d=new Date()) => { const dt = d instanceof Date ? d : new Date(); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`; };
const monthLabel = k => { const [y,m]=k.split('-'); return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m-1]+' '+y; };
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const h = (tag,attrs={},children=[]) => {
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==='class') el.className=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else el.setAttribute(k,v);
  }
  for(const c of (Array.isArray(children)?children:[children])){
    if(c==null||c===false) continue;
    el.append(typeof c==='string'||typeof c==='number' ? document.createTextNode(c) : c);
  }
  return el;
};
const el = (html) => { const d=document.createElement('div'); d.innerHTML=html; return d.firstChild; };

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const KEY = 'finanzas_v3';
const loadDB = () => { try { const r=localStorage.getItem(KEY); return r?JSON.parse(r):null; } catch{return null;} };
const saveDB = d => { try { localStorage.setItem(KEY,JSON.stringify(d)); } catch{} };

// ─── DEFAULT DATA ─────────────────────────────────────────────────────────────
const DEFAULT = () => ({
  categories:[
    {id:'c1',name:'Supermercado',icon:'🛒',color:'#4a7c62',type:'gasto'},
    {id:'c2',name:'Combustible',icon:'⛽',color:'#9a7d3a',type:'gasto'},
    {id:'c3',name:'Servicios',icon:'💡',color:'#5a6a85',type:'gasto'},
    {id:'c4',name:'Salud',icon:'🏥',color:'#7c5a6b',type:'gasto'},
    {id:'c5',name:'Entretenimiento',icon:'🎬',color:'#6b6b8b',type:'gasto'},
    {id:'c6',name:'Restaurante',icon:'🍽️',color:'#7a6040',type:'gasto'},
    {id:'c7',name:'Ropa',icon:'👕',color:'#4a6a7a',type:'gasto'},
    {id:'c8',name:'Transporte',icon:'🚌',color:'#5a7a5a',type:'gasto'},
    {id:'c9',name:'Impuesto',icon:'🧾',color:'#b45757',type:'gasto'},
    {id:'c10',name:'Sueldo',icon:'💰',color:'#4a7c62',type:'ingreso'},
    {id:'c11',name:'Freelance',icon:'💻',color:'#5a6a85',type:'ingreso'},
    {id:'c12',name:'Otros ingresos',icon:'📥',color:'#6b6b8b',type:'ingreso'},
    {id:'c13',name:'Varios',icon:'📦',color:'#9a9a9a',type:'ambos'},
  ],
  cards:[
    {id:'k1',name:'Visa Galicia',color:'#4b5563',limit:500000,currency:'ARS',closingDay:20,dueDay:10},
    {id:'k2',name:'Mastercard BBVA',color:'#9a7d3a',limit:300000,currency:'ARS',closingDay:15,dueDay:5},
    {id:'k3',name:'Mercado Pago',color:'#4a7c62',limit:0,currency:'ARS',closingDay:0,dueDay:0},
  ],
  accounts:[
    {id:'a1',name:'Banco Río',bank:'Banco Río (Santander)',icon:'🏦',color:'#b45757',currency:'ARS',balance:0,type:'banco'},
    {id:'a2',name:'Banco Nación',bank:'Banco Nación',icon:'🏦',color:'#4b5563',currency:'ARS',balance:0,type:'banco'},
    {id:'a3',name:'Banco Hipotecario',bank:'Banco Hipotecario',icon:'🏦',color:'#5a6a85',currency:'ARS',balance:0,type:'banco'},
    {id:'a4',name:'Mercado Pago',bank:'Mercado Pago',icon:'📱',color:'#4a7c62',currency:'ARS',balance:0,type:'billetera'},
    {id:'a5',name:'Efectivo',bank:'Efectivo',icon:'💵',color:'#9a7d3a',currency:'ARS',balance:0,type:'efectivo'},
  ],
  movements:[],
  dues:[],
  installmentGroups:[],
  cardPayments:[],
  cardDueDates:{},
  inversiones:[],
});

// ─── STATE ───────────────────────────────────────────────────────────────────
let DB = loadDB() || DEFAULT();
// Migrate older DB versions
if(!DB.installmentGroups) DB.installmentGroups=[];
if(!DB.cardPayments) DB.cardPayments=[];
if(!DB.cardDueDates) DB.cardDueDates={};
if(!DB.inversiones) DB.inversiones=[];

// Marcar movimientos de cuotas existentes como pendingCard si aún no lo están
// (migración de datos anteriores)
let _migrated=false;
DB.movements.forEach(m=>{
  if(m.installmentGroupId && m.pendingCard===undefined){
    m.pendingCard=true; _migrated=true;
  }
});
if(_migrated) saveDB(DB);

// Movimientos "reales": excluye cuotas pendientes de tarjeta Y transferencias (para no duplicar en balance)
const realMovs = () => DB.movements.filter(m=>!m.pendingCard && !m.isTransfer);

let currentTab = 'resumen';
let activeChart = null;

// ─── MODAL ───────────────────────────────────────────────────────────────────
const overlay = document.getElementById('modal-overlay');
const modalTitle = document.getElementById('modal-title');
const modalBody = document.getElementById('modal-body');
document.getElementById('modal-close').onclick = closeModal;
overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });

function openModal(title, bodyEl) {
  modalTitle.textContent = title;
  modalBody.innerHTML = '';
  modalBody.appendChild(bodyEl);
  overlay.classList.add('open');
}
function closeModal() { overlay.classList.remove('open'); }

// ─── FAB ─────────────────────────────────────────────────────────────────────
const fab = document.getElementById('fab');

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
const TABS = [
  {id:'resumen',icon:'◈',label:'Inicio'},
  {id:'movimientos',icon:'⟳',label:'Movim.'},
  {id:'tarjetas',icon:'💳',label:'Tarjetas'},
  {id:'inversiones',icon:'📈',label:'Inversión'},
  {id:'categorias',icon:'⊞',label:'Categ.'},
  {id:'reportes',icon:'◎',label:'Reportes'},
  {id:'vencimientos',icon:'◷',label:'Vencim.'},
];

function renderNav() {
  const nav = document.getElementById('bottom-nav');
  nav.innerHTML = '';
  TABS.forEach(t => {
    const btn = h('button',{class:'nav-btn',onClick:()=>navigate(t.id)},[
      h('span',{class:'nav-icon'+(t.id===currentTab?' active':'')},t.icon),
      h('span',{class:'nav-label'+(t.id===currentTab?' active':'')},t.label),
      ...(t.id===currentTab ? [h('div',{class:'nav-dot'})] : [])
    ]);
    nav.appendChild(btn);
  });
}

function navigate(tab) {
  currentTab = tab;
  const cur = TABS.find(t=>t.id===tab);
  document.getElementById('header-title').textContent = cur.label;
  document.getElementById('header-icon').textContent = cur.icon;
  renderNav();
  renderContent();
}

function renderContent() {
  if(activeChart) { activeChart.destroy(); activeChart=null; }
  fab.style.display = 'none';
  fab.onclick = null;
  const c = document.getElementById('content');
  c.innerHTML = '';
  const views = {resumen,movimientos,tarjetas,inversiones,categorias,reportes,vencimientos};
  const view = views[currentTab]?.();
  if(view) c.appendChild(view);
  c.classList.remove('fade');
  void c.offsetWidth;
  c.classList.add('fade');
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function makeCard(inner, extraStyle={}) {
  const d = h('div',{class:'card card-pad'});
  Object.assign(d.style, extraStyle);
  if(typeof inner === 'string') d.innerHTML = inner;
  else d.appendChild(inner);
  return d;
}

function makeTag(text, color) {
  return h('span',{class:'tag',style:{background:color+'18',color,border:`1px solid ${color}30`}},text);
}

function makePills(options, active, onChange) {
  const wrap = h('div',{class:'pills'});
  options.forEach(([val,label]) => {
    const btn = h('button',{class:'pill'+(active===val?' active':''),onClick:()=>onChange(val)},label);
    wrap.appendChild(btn);
  });
  return wrap;
}

function makeField(label, inputEl) {
  return h('div',{class:'field'},[
    h('label',{class:'field-label'},label),
    inputEl
  ]);
}

function makeInput(attrs={}) {
  const inp = h('input',{class:'inp',...attrs});
  return inp;
}

function makeSelect(options, value, onChange) {
  const sel = h('select',{class:'inp',onChange:e=>onChange(e.target.value)});
  options.forEach(([v,l]) => {
    const o = h('option',{value:v},l);
    if(v===value) o.selected=true;
    sel.appendChild(o);
  });
  return sel;
}

function makeBtn(label, onClick, variant='primary', opts={}) {
  const cls = ['btn',`btn-${variant}`,opts.sm?'btn-sm':'',opts.full?'btn-full':''].filter(Boolean).join(' ');
  const btn = h('button',{class:cls, onClick});
  btn.textContent = label;
  if(opts.disabled) btn.disabled = true;
  return btn;
}

function makeDelBtn(onClick) {
  return h('button',{class:'del-btn',onClick},'✕');
}

// ─── RESUMEN ─────────────────────────────────────────────────────────────────
function resumen() {
  const wrap = h('div');
  const now = new Date();
  const mk = monthKey();
  const movs = realMovs().filter(m=>m.date?.startsWith(mk));
  const arsIn  = movs.filter(m=>m.type==='ingreso'&&m.currency==='ARS').reduce((a,m)=>a+m.amount,0);
  const arsOut = movs.filter(m=>m.type==='gasto'&&m.currency==='ARS').reduce((a,m)=>a+m.amount,0);
  const usdIn  = movs.filter(m=>m.type==='ingreso'&&m.currency==='USD').reduce((a,m)=>a+m.amount,0);
  const usdOut = movs.filter(m=>m.type==='gasto'&&m.currency==='USD').reduce((a,m)=>a+m.amount,0);
  const net = arsIn - arsOut;

  // Inversiones
  const totalInvARS = DB.inversiones.filter(i=>i.currency==='ARS').reduce((s,i)=>s+i.currentAmount,0);
  const totalInvUSD = DB.inversiones.filter(i=>i.currency==='USD').reduce((s,i)=>s+i.currentAmount,0);
  const totalCuentasARS = DB.accounts.filter(a=>a.currency==='ARS').reduce((s,a)=>s+a.balance,0);
  const totalCuentasUSD = DB.accounts.filter(a=>a.currency==='USD').reduce((s,a)=>s+a.balance,0);
  const patrimonioARS = totalCuentasARS + totalInvARS;
  const patrimonioUSD = totalCuentasUSD + totalInvUSD;

  // Hero
  const hero = h('div',{class:'hero'});
  hero.innerHTML = `
    <div class="hero-sub">Balance · ${monthLabel(mk)}</div>
    <div class="hero-amount mono">${fmt(net)}</div>
    ${(usdIn>0||usdOut>0)?`<div class="mono" style="font-size:15px;color:rgba(255,255,255,.8);margin-top:3px">${fmt(usdIn-usdOut,'USD')} USD</div>`:''}
    <div class="hero-boxes">
      <div class="hero-box"><div class="hero-box-label">↑ INGRESOS</div><div class="hero-box-val mono">${fmt(arsIn)}</div></div>
      <div class="hero-box"><div class="hero-box-label">↓ GASTOS</div><div class="hero-box-val mono">${fmt(arsOut)}</div></div>
    </div>
    ${(patrimonioARS>0||patrimonioUSD>0)?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.2)">
      <div style="font-size:10px;color:rgba(255,255,255,.6);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Patrimonio total</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap">
        ${patrimonioARS>0?`<span class="mono" style="font-size:15px;color:#fff;font-weight:600">${fmt(patrimonioARS)}</span>`:''}
        ${patrimonioUSD>0?`<span class="mono" style="font-size:15px;color:rgba(255,255,255,.85);font-weight:600">${fmt(patrimonioUSD,'USD')}</span>`:''}
      </div>
      ${DB.inversiones.length>0?`<div style="font-size:10px;color:rgba(255,255,255,.5);margin-top:3px">Cuentas + ${DB.inversiones.length} inversión${DB.inversiones.length>1?'es':''}</div>`:''}
    </div>`:''}`;
  wrap.appendChild(hero);

  // Cuentas — con total y diferencia de caja
  if(DB.accounts.length>0) {
    // Card resumen de cuentas
    const totalLiqARS = DB.accounts.filter(a=>a.currency==='ARS').reduce((s,a)=>s+a.balance,0);
    const totalLiqUSD = DB.accounts.filter(a=>a.currency==='USD').reduce((s,a)=>s+a.balance,0);

    // Diferencia de caja: saldo en cuentas vs lo que debería haber según movimientos del mes
    // (ingresos - gastos del mes). Si hay diferencia, hay movimientos sin registrar.
    const diffARS = totalLiqARS - net;

    const resumenCuentas=h('div',{class:'card card-pad',style:{marginBottom:'14px',background:`linear-gradient(135deg,${G.accent}0a,${G.accent}04)`}});
    resumenCuentas.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-size:10px;color:${G.muted};font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">Liquidez total</div>
          <div class="mono" style="font-size:24px;font-weight:800;color:${totalLiqARS>=0?G.text:G.red}">${fmt(totalLiqARS)}</div>
          ${totalLiqUSD>0?`<div class="mono" style="font-size:14px;color:${G.muted};margin-top:2px">${fmt(totalLiqUSD,'USD')}</div>`:''}
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:${G.muted};font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">Dif. de caja</div>
          <div class="mono" style="font-size:18px;font-weight:700;color:${Math.abs(diffARS)<100?G.green:diffARS>0?G.yellow:G.red}">${diffARS>=0?'+':''}${fmt(diffARS)}</div>
          <div style="font-size:10px;color:${G.muted};margin-top:2px">${Math.abs(diffARS)<100?'✓ Cuadra':'vs movim. del mes'}</div>
        </div>
      </div>
      <div style="font-size:11px;color:${G.muted};padding-top:10px;border-top:1px solid ${G.border}">
        💡 La dif. de caja compara el saldo real de tus cuentas con ingresos - gastos del mes. Si no cuadra, puede haber movimientos sin registrar.
      </div>`;
    wrap.appendChild(resumenCuentas);

    wrap.appendChild(h('div',{class:'sec-label'},'Desglose por cuenta'));
    const scr = h('div',{class:'accounts-scroll'});
    DB.accounts.forEach(a => {
      const ac = h('div',{class:'account-card',style:{border:`1.5px solid ${a.color}44`}});
      ac.innerHTML = `<div style="font-size:20px;margin-bottom:4px">${a.icon||'🏦'}</div>
        <div style="font-size:11px;color:${a.color};font-weight:700">${a.name}</div>
        <div class="mono" style="font-size:17px;font-weight:600;margin-top:4px;color:${a.balance>=0?G.text:G.red}">${fmt(a.balance,a.currency)}</div>
        <div style="font-size:10px;color:${G.muted};margin-top:2px">${a.bank}</div>`;
      scr.appendChild(ac);
    });
    wrap.appendChild(scr);
  }

  // Inversiones (resumen rápido)
  if(DB.inversiones.length>0) {
    wrap.appendChild(h('div',{class:'sec-label'},'Mis inversiones'));
    const invScr=h('div',{class:'accounts-scroll'});
    DB.inversiones.forEach(inv=>{
      const ganancia=inv.currentAmount-inv.initialAmount;
      const pct=inv.initialAmount>0?((ganancia/inv.initialAmount)*100).toFixed(2):0;
      const ic=h('div',{class:'account-card',style:{border:`1.5px solid ${inv.color||G.green}44`,minWidth:'160px'}});
      ic.innerHTML=`<div style="font-size:11px;color:${inv.color||G.green};font-weight:700">${inv.name}</div>
        <div class="mono" style="font-size:16px;font-weight:600;margin-top:4px">${fmt(inv.currentAmount,inv.currency)}</div>
        <div style="font-size:10px;color:${ganancia>=0?G.green:G.red};margin-top:2px;font-weight:600">${ganancia>=0?'+':''}${fmt(ganancia,inv.currency)} (${pct}%)</div>
        <div style="font-size:10px;color:${G.muted};margin-top:1px">${inv.type}${inv.liquidity?' · '+inv.liquidity:''}</div>`;
      invScr.appendChild(ic);
    });
    wrap.appendChild(invScr);
  }
  const upcoming = DB.dues.filter(d=>{
    if(d.paid)return false;
    const diff=(new Date(d.dueDate)-now)/86400000;
    return diff>=-1&&diff<=30;
  }).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,4);

  wrap.appendChild(h('div',{class:'sec-label'},'Próximos vencimientos'));
  if(upcoming.length===0) {
    wrap.appendChild(makeCard(h('div',{class:'empty'},'Sin vencimientos próximos 🎉')));
  } else {
    upcoming.forEach(d => {
      const diff=Math.ceil((new Date(d.dueDate)-now)/86400000);
      const urg=diff<=3;
      const c=makeCard(h('div'),{border:`1.5px solid ${urg?G.red+'44':G.border}`,padding:'11px 14px'});
      c.innerHTML='';
      const row=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}});
      row.innerHTML=`<div><div style="font-weight:700;font-size:14px">${d.name}</div>
        <div style="font-size:11px;color:${G.muted};margin-top:2px">${fmtDate(d.dueDate)}</div></div>
        <div style="text-align:right">
          <div class="mono" style="font-weight:700;color:${urg?G.red:G.yellow};font-size:14px">${fmt(d.amount,d.currency)}</div>
          <div style="font-size:10px;color:${urg?G.red:G.muted};margin-top:1px">${diff<=0?'¡Vencido!':`En ${diff}d`}</div>
        </div>`;
      c.appendChild(row);
      wrap.appendChild(c);
    });
  }

  // Últimos movimientos
  wrap.appendChild(h('div',{class:'sec-label',style:{marginTop:'14px'}},'Últimos movimientos'));
  const recent = [...realMovs()].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
  if(recent.length===0) {
    wrap.appendChild(makeCard(h('div',{class:'empty'},'Agregá tu primer movimiento desde la pestaña Movimientos ✨')));
  } else {
    recent.forEach(m => {
      const cat=DB.categories.find(c=>c.id===m.categoryId);
      const card=makeCard(h('div'));
      card.innerHTML='';
      const row=h('div',{class:'mov-row'});
      row.innerHTML=`<div class="mov-icon" style="background:${(cat?.color||G.muted)+'18'}">${cat?.icon||'📦'}</div>
        <div class="mov-info"><div class="mov-name">${m.description||cat?.name||'Sin categoría'}</div>
        <div style="font-size:11px;color:${G.muted}">${fmtDate(m.date)}</div></div>
        <div class="mono mov-amount" style="color:${m.type==='ingreso'?G.green:G.red}">${m.type==='ingreso'?'+':'-'}${fmt(m.amount,m.currency)}</div>`;
      card.appendChild(row);
      wrap.appendChild(card);
    });
  }

  return wrap;
}

// ─── MOVIMIENTOS ─────────────────────────────────────────────────────────────
function movimientos() {
  const wrap = h('div');
  let filterType='todos', filterMonth=monthKey();

  const months = [...new Set(realMovs().map(m=>m.date?.slice(0,7)))].sort().reverse();
  if(!months.includes(monthKey())) months.unshift(monthKey());

  function renderList() {
    listWrap.innerHTML='';
    const filtered=[...DB.movements.filter(m=>!m.pendingCard)]
      .filter(m=>(filterType==='todos'||m.type===filterType||(filterType==='todos'&&m.isTransfer))&&m.date?.startsWith(filterMonth))
      .sort((a,b)=>b.date.localeCompare(a.date));
    const totalIn=filtered.filter(m=>m.type==='ingreso').reduce((s,m)=>s+m.amount,0);
    const totalOut=filtered.filter(m=>m.type==='gasto').reduce((s,m)=>s+m.amount,0);

    // Stats
    const sr=h('div',{class:'stat-row'});
    [[fmt(totalIn),G.green,G.greenDim,'Ingresos'],[fmt(totalOut),G.red,G.redDim,'Gastos'],[fmt(totalIn-totalOut),totalIn-totalOut>=0?G.green:G.red,null,'Neto']].forEach(([val,col,bg,label])=>{
      const s=h('div',{class:'stat-box',style:{background:bg||'var(--cardAlt)'}});
      s.innerHTML=`<div class="stat-label" style="color:${col}">${label}</div><div class="mono stat-val" style="color:${col}">${val}</div>`;
      sr.appendChild(s);
    });
    listWrap.appendChild(sr);

    if(filtered.length===0) { listWrap.appendChild(makeCard(h('div',{class:'empty'},'Sin movimientos'))); return; }

    filtered.forEach(m => {
      const cat=DB.categories.find(c=>c.id===m.categoryId);
      const card=DB.cards.find(c=>c.id===m.cardId);
      const acc=DB.accounts.find(a=>a.id===m.accountId);
      const row=h('div',{class:'mov-row'});
      const meta=h('div',{class:'mov-meta'});
      meta.appendChild(document.createTextNode(fmtDate(m.date)+' '));
      if(cat) meta.appendChild(makeTag(cat.name,cat.color));
      if(card) meta.appendChild(makeTag(card.name.split(' ')[0],card.color));
      if(acc) meta.appendChild(makeTag(acc.name,acc.color));
      row.appendChild(h('div',{class:'mov-icon',style:{background:(cat?.color||G.muted)+'18'}},cat?.icon||'📦'));
      const info=h('div',{class:'mov-info'},[h('div',{class:'mov-name'},m.description||cat?.name||'Sin cat.'),meta]);
      row.appendChild(info);
      const right=h('div',{style:{display:'flex',alignItems:'center',gap:'6px',flexShrink:0}});
      right.appendChild(h('div',{class:'mono mov-amount',style:{color:m.type==='ingreso'?G.green:G.red}},`${m.type==='ingreso'?'+':'-'}${fmt(m.amount,m.currency)}`));
      const editB=h('button',{style:{width:'26px',height:'26px',borderRadius:'7px',border:`1.5px solid ${G.border}`,fontSize:'12px',display:'flex',alignItems:'center',justifyContent:'center',background:G.accentDim,color:G.accent},onClick:()=>openEditMovForm(m,renderList)},'✏️');
      right.appendChild(editB);
      right.appendChild(makeDelBtn(()=>{ delMovimiento(m.id); renderList(); }));
      row.appendChild(right);
      const c=makeCard(row);
      listWrap.appendChild(c);
    });
  }

  // Month pills
  const monthPills=h('div',{class:'pills'});
  months.forEach(mk=>{
    const btn=h('button',{class:'pill'+(filterMonth===mk?' active':''),onClick:()=>{ filterMonth=mk; monthPills.querySelectorAll('.pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderList(); }},monthLabel(mk));
    monthPills.appendChild(btn);
  });
  wrap.appendChild(monthPills);

  // Type pills
  const typePills=h('div',{class:'pills'});
  [['todos','Todos'],['ingreso','Ingreso'],['gasto','Gasto']].forEach(([val,lbl])=>{
    const btn=h('button',{class:'pill'+(filterType===val?' active':''),onClick:()=>{ filterType=val; typePills.querySelectorAll('.pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderList(); }},lbl);
    typePills.appendChild(btn);
  });
  wrap.appendChild(typePills);

  const listWrap=h('div');
  wrap.appendChild(listWrap);
  renderList();

  fab.style.display='flex';
  fab.onclick=()=>openMovForm(renderList);

  return wrap;
}

function delMovimiento(id) {
  const m=DB.movements.find(x=>x.id===id);
  if(m?.accountId){ const delta=m.type==='ingreso'?-m.amount:m.amount; DB.accounts=DB.accounts.map(a=>a.id===m.accountId?{...a,balance:a.balance+delta}:a); }
  DB.movements=DB.movements.filter(x=>x.id!==id);
  saveDB(DB);
}

function openMovForm(onSave) {
  let form={type:'gasto',description:'',amount:'',currency:'ARS',categoryId:'',date:today(),cardId:'',accountId:'',accountDestId:'',installments:'1'};
  const body=h('div');

  function rebuild() {
    body.innerHTML='';

    // Tipo — ahora incluye transferencia
    const typeRow=h('div',{class:'field'},[h('label',{class:'field-label'},'Tipo')]);
    const typePills=h('div',{style:{display:'flex',gap:'8px'}});
    [['gasto','Gasto'],['ingreso','Ingreso'],['transferencia','🔄 Transferencia']].forEach(([t,l])=>{
      const btn=h('button',{class:'pill'+(form.type===t?' active':''),onClick:()=>{ form.type=t; form.categoryId=''; form.cardId=''; rebuild(); }},l);
      typePills.appendChild(btn);
    });
    typeRow.appendChild(typePills);
    body.appendChild(typeRow);

    if(form.type==='transferencia') {
      // Formulario simplificado para transferencia
      const descInp=makeInput({type:'text',placeholder:'Ej: Paso a Nación, Retiro efectivo...',value:form.description});
      descInp.oninput=e=>form.description=e.target.value;
      body.appendChild(makeField('Descripción (opcional)',descInp));

      const twoCol=h('div',{class:'two-col'});
      const amtInp=makeInput({type:'number',placeholder:'0',value:form.amount});
      amtInp.oninput=e=>form.amount=e.target.value;
      twoCol.appendChild(h('div',{class:'col-2'},[makeField('Monto',amtInp)]));
      twoCol.appendChild(makeField('Moneda',makeSelect([['ARS','ARS $'],['USD','USD $']],form.currency,v=>form.currency=v)));
      body.appendChild(twoCol);

      const dateInp=makeInput({type:'date',value:form.date});
      dateInp.oninput=e=>form.date=e.target.value;
      body.appendChild(makeField('Fecha',dateInp));

      // Cuenta origen
      const origenOpts=[['','Seleccioná cuenta origen'],...DB.accounts.map(a=>[a.id,`${a.icon||'🏦'} ${a.name} (${fmt(a.balance,a.currency)})`])];
      body.appendChild(makeField('Desde (origen)',makeSelect(origenOpts,form.accountId,v=>form.accountId=v)));

      // Cuenta destino
      const destOpts=[['','Seleccioná cuenta destino'],...DB.accounts.filter(a=>a.id!==form.accountId).map(a=>[a.id,`${a.icon||'🏦'} ${a.name} (${fmt(a.balance,a.currency)})`])];
      body.appendChild(makeField('Hacia (destino)',makeSelect(destOpts,form.accountDestId,v=>form.accountDestId=v)));

      // Preview
      if(form.accountId && form.accountDestId && form.amount) {
        const orig=DB.accounts.find(a=>a.id===form.accountId);
        const dest=DB.accounts.find(a=>a.id===form.accountDestId);
        const prev=h('div',{style:{background:G.accentDim,borderRadius:'10px',padding:'10px 12px',fontSize:'12px',color:G.textSoft}});
        prev.innerHTML=`<strong>${orig?.name}</strong> → <strong>${dest?.name}</strong><br>
          <span style="color:${G.red}">−${fmt(Number(form.amount),form.currency)}</span> / <span style="color:${G.green}">+${fmt(Number(form.amount),form.currency)}</span>`;
        body.appendChild(prev);
      }

      const btnRow=h('div',{class:'btn-row'});
      btnRow.appendChild(makeBtn('Cancelar',closeModal,'ghost'));
      btnRow.appendChild(makeBtn('Transferir',()=>{
        if(!form.amount||!form.accountId||!form.accountDestId) return;
        const monto=Number(form.amount);
        const desc=form.description||`Transferencia a ${DB.accounts.find(a=>a.id===form.accountDestId)?.name}`;
        // Movimiento salida
        DB.movements.push({id:uid(),type:'gasto',description:desc,amount:monto,currency:form.currency,date:form.date,accountId:form.accountId,categoryId:'',isTransfer:true,transferPairId:null});
        // Movimiento entrada
        DB.movements.push({id:uid(),type:'ingreso',description:desc,amount:monto,currency:form.currency,date:form.date,accountId:form.accountDestId,categoryId:'',isTransfer:true});
        // Actualizar saldos
        DB.accounts=DB.accounts.map(a=>{
          if(a.id===form.accountId) return {...a,balance:a.balance-monto};
          if(a.id===form.accountDestId) return {...a,balance:a.balance+monto};
          return a;
        });
        saveDB(DB); closeModal(); onSave();
      },'primary',{full:true}));
      body.appendChild(btnRow);
      return;
    }

    // Gasto / Ingreso — formulario original
    const descInp=makeInput({type:'text',placeholder:'Ej: Netflix, supermercado, sueldo...',value:form.description});
    descInp.oninput=e=>form.description=e.target.value;
    body.appendChild(makeField('Descripción',descInp));

    const twoCol=h('div',{class:'two-col'});
    const amtInp=makeInput({type:'number',placeholder:'0',value:form.amount});
    amtInp.oninput=e=>form.amount=e.target.value;
    twoCol.appendChild(h('div',{class:'col-2'},[makeField('Monto',amtInp)]));
    twoCol.appendChild(makeField('Moneda',makeSelect([['ARS','ARS $'],['USD','USD $']],form.currency,v=>form.currency=v)));
    body.appendChild(twoCol);

    const cats=DB.categories.filter(c=>c.type===form.type||c.type==='ambos');
    const catField=h('div',{class:'field'},[h('label',{class:'field-label'},'Categoría')]);
    const catGrid=h('div',{class:'cat-grid'});
    cats.forEach(c=>{
      const btn=h('button',{class:'cat-pick-btn'+(form.categoryId===c.id?' selected':''),style:{color:c.color,background:form.categoryId===c.id?c.color+'18':'#f8fafc',borderColor:form.categoryId===c.id?c.color:G.border},onClick:()=>{ form.categoryId=c.id; rebuild(); }},`${c.icon} ${c.name}`);
      catGrid.appendChild(btn);
    });
    catField.appendChild(catGrid);
    body.appendChild(catField);

    const dateInp=makeInput({type:'date',value:form.date});
    dateInp.oninput=e=>form.date=e.target.value;
    body.appendChild(makeField('Fecha',dateInp));

    body.appendChild(makeField('Cuenta bancaria',makeSelect([['','Sin cuenta'],...DB.accounts.map(a=>[a.id,`${a.icon||'🏦'} ${a.name}`])],form.accountId,v=>form.accountId=v)));
    body.appendChild(makeField('Tarjeta',makeSelect([['','Efectivo / Sin tarjeta'],...DB.cards.map(c=>[c.id,c.name])],form.cardId,v=>{ form.cardId=v; rebuild(); })));

    if(form.cardId&&form.type==='gasto') {
      const cuotaInp=makeInput({type:'number',min:'1',max:'48',value:form.installments});
      cuotaInp.oninput=e=>{ form.installments=e.target.value; };
      body.appendChild(makeField('Cuotas',cuotaInp));
      // Indicador de período de imputación
      const card=DB.cards.find(c=>c.id===form.cardId);
      if(card&&form.date){
        const ip=imputPeriodForDate(card,form.date);
        const per=buildPeriodFromKey(card,ip);
        const isClosedOrPaid=DB.cardPayments?.some(p=>p.cardId===card.id&&p.periodKey===ip);

  }

  rebuild();

}

function saveMovimiento(form) {
  const base={...form,id:uid(),amount:Number(form.amount)};
  let newMovs=[...DB.movements];
  if(Number(form.installments)>1&&form.cardId) {
    const cuota=Math.round(base.amount/Number(form.installments));
    const card=DB.cards.find(c=>c.id===form.cardId);
    for(let i=0;i<Number(form.installments);i++){
      const d=new Date((form.date||today())+'T12:00:00'); d.setMonth(d.getMonth()+i);
      const movDate=d.toISOString().split('T')[0];
      const imputPeriod=card?imputPeriodForDate(card,movDate):movDate.slice(0,7);
      newMovs.push({...base,id:uid(),amount:cuota,date:movDate,description:`${form.description} (${i+1}/${form.installments})`,installments:1,pendingCard:true,imputPeriod});
    }
  } else {
    if(form.cardId&&form.type==='gasto'){
      const card=DB.cards.find(c=>c.id===form.cardId);
      if(card){base.imputPeriod=imputPeriodForDate(card,form.date||today());}
      base.pendingCard=true;
    }
    newMovs.push(base);
  }
  // Solo afecta saldo de cuenta si NO es gasto con tarjeta
  if(form.accountId && !(form.cardId && form.type==='gasto')){
    const delta=form.type==='ingreso'?base.amount:-base.amount;
    DB.accounts=DB.accounts.map(a=>a.id===form.accountId?{...a,balance:a.balance+delta}:a);
  }
  DB.movements=newMovs;
  saveDB(DB);
}

      if(original.accountId && !(original.cardId && original.type==='gasto')){
        const revert=original.type==='ingreso'?-original.amount:original.amount;
        DB.accounts=DB.accounts.map(a=>a.id===original.accountId?{...a,balance:a.balance+revert}:a);
      }

      // Actualizar saldo con nuevo valor (si no es gasto con tarjeta)

  rebuild();

}

// Retorna el periodKey ("YYYY-MM") al que se imputa una compra según día de cierre.
// Si la fecha cae DESPUÉS del día de cierre → va al resumen del mes siguiente.
function imputPeriodForDate(card, dateStr) {
  const cd = card.closingDay || 20;
  const d = new Date((dateStr||today()) + 'T12:00:00');
  let y = d.getFullYear(), m = d.getMonth() + 1;
  if (d.getDate() > cd) { m++; if (m > 12) { m = 1; y++; } }
  return `${y}-${String(m).padStart(2,'0')}`;
}

function buildPeriodFromKey(card, pk) {
  const [y, m] = pk.split('-').map(Number);
  const cd = card.closingDay || 20;
  const dd = card.dueDay || 10;
  return {
    start:   new Date(y, m-2, cd+1).toISOString().split('T')[0],
    end:     new Date(y, m-1, cd).toISOString().split('T')[0],
    dueDate: new Date(y, m, dd).toISOString().split('T')[0],
    label: monthLabel(pk), periodKey: pk
  };
}

function getCardPeriod(card, refDate) {
  const ref = refDate ? new Date(refDate + 'T12:00:00') : new Date();
  const cd = card.closingDay || 20;
  let y = ref.getFullYear(), m = ref.getMonth() + 1;
  if (ref.getDate() > cd) { m++; if (m > 12) { m = 1; y++; } }
  return buildPeriodFromKey(card, `${y}-${String(m).padStart(2,'0')}`);
}

// Retorna el imputPeriod de un movimiento (fallback a fecha si no tiene el campo)
function movImputPK(mov) {
  if (mov.imputPeriod) return mov.imputPeriod;
  const card = DB.cards.find(c => c.id === mov.cardId);
  return card ? imputPeriodForDate(card, mov.date) : mov.date.slice(0, 7);
}

  // ── Formulario: cargar compra en cuotas ya existente ─────────────────────
  function openInstallmentForm() {
    if(DB.cards.length===0){ alert('Primero agregá una tarjeta.'); return; }
    let f={cardId:DB.cards[0].id, description:'', totalAmount:'', installments:'', startMonth:monthKey(), currency:'ARS', categoryId:''};
    const body=h('div');
    function rb(){
      body.innerHTML='';
      body.appendChild(makeField('Tarjeta',makeSelect(DB.cards.map(c=>[c.id,c.name]),f.cardId,v=>f.cardId=v)));
      const di=makeInput({type:'text',placeholder:'Ej: TV Samsung, Notebook, Heladera...'}); di.oninput=e=>f.description=e.target.value;
      body.appendChild(makeField('Descripción',di));
      const tc=h('div',{class:'two-col'});
      const ti=makeInput({type:'number',placeholder:'Total compra',value:f.totalAmount}); ti.oninput=e=>f.totalAmount=e.target.value;
      tc.appendChild(h('div',{class:'col-2'},[makeField('Monto total',ti)]));
      tc.appendChild(makeField('Moneda',makeSelect([['ARS','ARS $'],['USD','USD $']],f.currency,v=>f.currency=v)));
      body.appendChild(tc);
      const tc2=h('div',{class:'two-col'});
      const ii=makeInput({type:'number',min:'2',max:'48',placeholder:'Ej: 12',value:f.installments}); ii.oninput=e=>f.installments=e.target.value;
      tc2.appendChild(makeField('Cant. cuotas',ii));
      // Mes de la 1ra cuota
      const months6=[]; const base=new Date(); base.setDate(1);
      for(let i=-1;i<12;i++){ const d=new Date(base.getFullYear(),base.getMonth()+i,1); months6.push([monthKey(d),monthLabel(monthKey(d))]); }
      tc2.appendChild(makeField('1ra cuota en',makeSelect(months6,f.startMonth,v=>f.startMonth=v)));
      body.appendChild(tc2);
      // Categoría
      const cats=DB.categories.filter(c=>c.type==='gasto'||c.type==='ambos');
      const catField=h('div',{class:'field'},[h('label',{class:'field-label'},'Categoría')]);
      const catGrid=h('div',{class:'cat-grid'});
      cats.forEach(c=>{ const btn=h('button',{class:'cat-pick-btn'+(f.categoryId===c.id?' selected':''),style:{color:c.color,background:f.categoryId===c.id?c.color+'18':'#f8fafc',borderColor:f.categoryId===c.id?c.color:G.border},onClick:()=>{ f.categoryId=c.id; rb(); }},`${c.icon} ${c.name}`); catGrid.appendChild(btn); });
      catField.appendChild(catGrid);
      body.appendChild(catField);

      // Preview de cuotas
      if(f.totalAmount&&f.installments&&Number(f.installments)>0) {
        const cuotaVal=Math.round(Number(f.totalAmount)/Number(f.installments));
        const previewDiv=h('div',{style:{background:G.accentDim,borderRadius:'10px',padding:'10px 12px',marginBottom:'10px',fontSize:'12px',color:G.textSoft}});
        previewDiv.innerHTML=`<span style="font-weight:700;color:${G.accent}">Vista previa:</span> ${f.installments} cuotas de <span class="mono" style="font-weight:700">${fmt(cuotaVal,f.currency)}</span> desde ${monthLabel(f.startMonth)}`;
        body.appendChild(previewDiv);
      }

      const br=h('div',{class:'btn-row'});
      br.appendChild(makeBtn('Cancelar',closeModal,'ghost'));
      br.appendChild(makeBtn('Cargar cuotas',()=>{
        if(!f.description||!f.totalAmount||!f.installments||Number(f.installments)<1)return;
        const n=Number(f.installments);
        const cuota=Math.round(Number(f.totalAmount)/n);
        const [y,m]=f.startMonth.split('-').map(Number);
        const groupId=uid();
        const card=DB.cards.find(c=>c.id===f.cardId);
        const cd=card?.closingDay||20;
        for(let i=0;i<n;i++){
          const pm=new Date(y,m-1+i,1);
          const imputPeriod=`${pm.getFullYear()}-${String(pm.getMonth()+1).padStart(2,'0')}`;
          const symDay=Math.min(cd,new Date(pm.getFullYear(),pm.getMonth()+1,0).getDate());
          const d=new Date(pm.getFullYear(),pm.getMonth(),symDay);
          DB.movements.push({
            id:uid(),type:'gasto',description:`${f.description} (${i+1}/${n})`,
            amount:cuota,currency:f.currency,
            date:d.toISOString().split('T')[0],
            cardId:f.cardId,categoryId:f.categoryId,
            installmentGroupId:groupId,installmentNum:i+1,installmentTotal:n,
            pendingCard:true,imputPeriod
          });
        }
        DB.installmentGroups.push({id:groupId,description:f.description,totalAmount:Number(f.totalAmount),installments:n,cardId:f.cardId,currency:f.currency,createdAt:today()});
        saveDB(DB);
        closeModal();
        renderSub();
      },'primary',{full:true}));
      body.appendChild(br);
    }
    rb();
    openModal('Cargar cuotas pendientes',body);
  }

  function openEditSingleInstallment(mov, group, onSave) {

    };

      body.innerHTML='';

      ai.oninput=e=>f.amount=e.target.value;

      tc.appendChild(makeField('Moneda',makeSelect([['ARS','ARS $'],['USD','USD $']],f.currency,v=>f.currency=v)));
      body.appendChild(tc);

      // Fecha
      const dateInp=makeInput({type:'date',value:f.date});
      dateInp.oninput=e=>f.date=e.target.value;
      body.appendChild(makeField('Fecha de esta cuota',dateInp));

      // Categoría
      const cats=DB.categories.filter(c=>c.type==='gasto'||c.type==='ambos');
      const catField=h('div',{class:'field'},[h('label',{class:'field-label'},'Categoría')]);
      const catGrid=h('div',{class:'cat-grid'});

        catGrid.appendChild(btn);
      });

      body.appendChild(br);

  function openEditInstallmentForm(group, onSave) {
    // Calculamos el mes de la primera cuota a partir de los movimientos
    const movs=DB.movements.filter(m=>m.installmentGroupId===group.id).sort((a,b)=>a.date.localeCompare(b.date));
    const firstMonth=movs.length>0?movs[0].date.slice(0,7):monthKey();
    let f={
      cardId:group.cardId,
      description:group.description,
      totalAmount:String(group.totalAmount),
      installments:String(group.installments),
      startMonth:firstMonth,
      currency:group.currency,
      categoryId:movs[0]?.categoryId||''
    };
    const body=h('div');

    // Info de cuotas ya pagadas
    const paid=movs.filter(m=>m.date<=today()).length;
    if(paid>0) {
      const warnDiv=h('div',{style:{background:G.yellowDim,borderRadius:'10px',padding:'10px 12px',marginBottom:'12px',fontSize:'12px',color:G.yellow,fontWeight:600}});
      warnDiv.textContent=`⚠️ Ya hay ${paid} cuota${paid>1?'s':''} pasada${paid>1?'s':''}. Al guardar se regeneran todas las cuotas desde el mes elegido.`;
      body.appendChild(warnDiv);
    }

    function rb(){
      const startY=body.children.length>0&&body.children[0].textContent.includes('⚠️')?1:0;
      while(body.children.length>startY) body.removeChild(body.lastChild);

      body.appendChild(makeField('Tarjeta',makeSelect(DB.cards.map(c=>[c.id,c.name]),f.cardId,v=>f.cardId=v)));
      const di=makeInput({type:'text',value:f.description}); di.oninput=e=>f.description=e.target.value;
      body.appendChild(makeField('Descripción',di));

      const tc=h('div',{class:'two-col'});
      const ti=makeInput({type:'number',value:f.totalAmount}); ti.oninput=e=>f.totalAmount=e.target.value;
      tc.appendChild(h('div',{class:'col-2'},[makeField('Monto total',ti)]));
      tc.appendChild(makeField('Moneda',makeSelect([['ARS','ARS $'],['USD','USD $']],f.currency,v=>f.currency=v)));
      body.appendChild(tc);

      const tc2=h('div',{class:'two-col'});
      const ii=makeInput({type:'number',min:'1',max:'48',value:f.installments}); ii.oninput=e=>f.installments=e.target.value;
      tc2.appendChild(makeField('Cant. cuotas',ii));
      const months6=[]; const base=new Date(); base.setDate(1);
      for(let i=-3;i<24;i++){ const d=new Date(base.getFullYear(),base.getMonth()+i,1); months6.push([monthKey(d),monthLabel(monthKey(d))]); }
      tc2.appendChild(makeField('1ra cuota en',makeSelect(months6,f.startMonth,v=>f.startMonth=v)));
      body.appendChild(tc2);

      // Categoría
      const cats=DB.categories.filter(c=>c.type==='gasto'||c.type==='ambos');
      const catField=h('div',{class:'field'},[h('label',{class:'field-label'},'Categoría')]);
      const catGrid=h('div',{class:'cat-grid'});
      cats.forEach(c=>{ const btn=h('button',{class:'cat-pick-btn'+(f.categoryId===c.id?' selected':''),style:{color:c.color,background:f.categoryId===c.id?c.color+'18':'#f8fafc',borderColor:f.categoryId===c.id?c.color:G.border},onClick:()=>{ f.categoryId=c.id; rb(); }},`${c.icon} ${c.name}`); catGrid.appendChild(btn); });
      catField.appendChild(catGrid);
      body.appendChild(catField);

      // Preview
      if(f.totalAmount&&f.installments&&Number(f.installments)>0){
        const cuotaVal=Math.round(Number(f.totalAmount)/Number(f.installments));
        const prev=h('div',{style:{background:G.accentDim,borderRadius:'10px',padding:'10px 12px',marginBottom:'10px',fontSize:'12px',color:G.textSoft}});
        prev.innerHTML=`<span style="font-weight:700;color:${G.accent}">Vista previa:</span> ${f.installments} cuotas de <span class="mono" style="font-weight:700">${fmt(cuotaVal,f.currency)}</span> desde ${monthLabel(f.startMonth)}`;
        body.appendChild(prev);
      }

      const br=h('div',{class:'btn-row'});
      br.appendChild(makeBtn('Cancelar',closeModal,'ghost'));
      br.appendChild(makeBtn('Guardar cambios',()=>{
        if(!f.description||!f.totalAmount||!f.installments||Number(f.installments)<1)return;
        const n=Number(f.installments);
        const cuota=Math.round(Number(f.totalAmount)/n);
        const [y,m]=f.startMonth.split('-').map(Number);
        // Borrar movimientos anteriores del grupo
        DB.movements=DB.movements.filter(mov=>mov.installmentGroupId!==group.id);
        // Regenerar con los nuevos datos
        for(let i=0;i<n;i++){
          const d=new Date(y,m-1+i,15);
          DB.movements.push({
            id:uid(),type:'gasto',description:`${f.description} (${i+1}/${n})`,
            amount:cuota,currency:f.currency,
            date:d.toISOString().split('T')[0],
            cardId:f.cardId,categoryId:f.categoryId,
            installmentGroupId:group.id,installmentNum:i+1,installmentTotal:n,

// ── Modal: confirmar pago de resumen de tarjeta ────────────────────────────
function openPagarResumen(card, periodMovs, totalAmount, period, onDone) {
  const body=h('div');

  // Encabezado
  const header=h('div',{style:{textAlign:'center',marginBottom:'16px'}});
  header.innerHTML=`
    <div style="font-size:36px;margin-bottom:6px">💳</div>
    <div style="font-weight:800;font-size:22px;color:${card.color}">${fmt(totalAmount)}</div>
    <div style="font-size:13px;color:${G.muted};margin-top:4px">Resumen ${period.label} · ${card.name}</div>`;
  body.appendChild(header);

  // Lista de gastos que se van a registrar
  const listBox=h('div',{style:{background:G.accentDim,borderRadius:'12px',padding:'10px 12px',marginBottom:'14px',maxHeight:'180px',overflowY:'auto'}});
  const listTitle=h('div',{style:{fontSize:'11px',fontWeight:700,color:G.accent,marginBottom:'8px',textTransform:'uppercase',letterSpacing:'.5px'}});
  listTitle.textContent=`${periodMovs.length} gastos que quedarán registrados`;
  listBox.appendChild(listTitle);
  periodMovs.forEach(m=>{
    const cat=DB.categories.find(x=>x.id===m.categoryId);
    const row=h('div',{style:{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:`1px solid ${G.border}`,fontSize:'12px'}});
    row.innerHTML=`<span style="color:${G.textSoft}">${cat?.icon||'📦'} ${m.description||cat?.name||'Gasto'}</span>
      <span class="mono" style="font-weight:700;color:${G.red}">${fmt(m.amount,m.currency)}</span>`;
    listBox.appendChild(row);
  });
  // Total
  const totalRow=h('div',{style:{display:'flex',justifyContent:'space-between',paddingTop:'8px',fontSize:'13px',fontWeight:800}});
  totalRow.innerHTML=`<span>Total</span><span class="mono" style="color:${card.color}">${fmt(totalAmount,card.currency)}</span>`;
  listBox.appendChild(totalRow);
  body.appendChild(listBox);

  // Fecha real de vencimiento de este resumen (editable)
  const dueDateInp=makeInput({type:'date',value:today()});
  body.appendChild(makeField('Fecha de vencimiento de este resumen',dueDateInp));

  // Cuenta desde donde se paga
  let selectedAcc='';
  const accSel=makeSelect([['','Sin descontar de cuenta'],...DB.accounts.map(a=>[a.id,`${a.name} (${fmt(a.balance,a.currency)})`])],'',v=>{ selectedAcc=v; });
  body.appendChild(makeField('Pagar desde cuenta',accSel));

  const br=h('div',{class:'btn-row',style:{marginTop:'16px'}});
  br.appendChild(makeBtn('Cancelar',closeModal,'ghost'));
  br.appendChild(makeBtn('✓ Confirmar pago',()=>{
    const payDate=dueDateInp.value||today();

    // En vez de crear nuevos movimientos, simplemente "liberamos" las cuotas
    // del período: quitamos el flag pendingCard y actualizamos fecha y cuenta
    const periodIds=new Set(periodMovs.map(m=>m.id));
    DB.movements=DB.movements.map(m=>{
      if(!periodIds.has(m.id)) return m;
      return {
        ...m,
        pendingCard:false,       // ya es real — aparece en historial y balance
        date:payDate,            // fecha del pago real
        accountId:selectedAcc||m.accountId||null,
        cardPaymentRef:true      // marca que se registró al pagar tarjeta
      };
    });

    // Descontar total del saldo de la cuenta
    if(selectedAcc){
      DB.accounts=DB.accounts.map(a=>a.id===selectedAcc?{...a,balance:a.balance-totalAmount}:a);
    }

    // Marcar período como pagado
    if(!DB.cardPayments) DB.cardPayments=[];
    DB.cardPayments.push({
      cardId:card.id,
      periodKey:period.periodKey,
      amount:totalAmount,
      paidAt:today(),
      dueDate:payDate
    });

    saveDB(DB);
    closeModal();
    onDone();
  },'primary',{full:true}));
  body.appendChild(br);

  openModal(`Pagar resumen ${card.name}`,body);
}
